<script>

const firebaseConfig = {

  storageBucket: "shigematu-kanri.firebasestorage.app",
  messagingSenderId: "928986828773",
  appId: "1:928986828773:web:4fa29264d7adaaebe9690c"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const _cw=console.warn;
console.warn=function(){if(arguments[0]&&String(arguments[0]).indexOf('Babel')>=0)return;_cw.apply(console,arguments);};

<script type="text/babel">
const {useState,useEffect,useMemo,useRef}=React;
const SK="inventory_v6";
const TOPS=["部品","製品","消耗品","原材料","その他"];
const CC_MAP={"製品":"01","部品":"02","消耗品":"03","原材料":"04","その他":"05"};
const DSUBS={"部品":["電子部品","機械部品","金属部品","樹脂部品","その他部品"],"製品":[],"消耗品":[],"原材料":[],"その他":[]};

const SAMPLE={
  items:[
    {id:"1",name:"ボルトM8",sku:"02-02-000001",category:"部品",subCategory:"機械部品",tags:["金属"],quantity:150,minQuantity:50,unit:"個",location:"棚A-1",notes:"",unitPrice:50,supplier:""},
    {id:"2",name:"ナットM8",sku:"02-02-000002",category:"部品",subCategory:"機械部品",tags:["金属"],quantity:120,minQuantity:40,unit:"個",location:"棚A-2",notes:"",unitPrice:30,supplier:""},
    {id:"3",name:"基板ユニットA",sku:"02-01-000001",category:"部品",subCategory:"電子部品",tags:[],quantity:30,minQuantity:10,unit:"枚",location:"棚B-1",notes:"",unitPrice:2500,supplier:""},
    {id:"4",name:"製品Xモデル",sku:"01-00-000001",category:"製品",subCategory:"",tags:[],quantity:5,minQuantity:2,unit:"台",location:"倉庫",notes:"",unitPrice:50000,supplier:""},
    {id:"5",name:"潤滑油",sku:"03-00-000001",category:"消耗品",subCategory:"",tags:[],quantity:5,minQuantity:10,unit:"L",location:"棚C-1",notes:"",unitPrice:800,supplier:""}
  ],
  transactions:[
    {id:"t1",itemId:"1",type:"in",quantity:100,date:"2026-03-20",note:"定期入庫",inSupplier:"",inUnitPrice:null},
    {id:"t2",itemId:"4",type:"out",quantity:1,date:"2026-03-22",note:"出荷",inSupplier:"",inUnitPrice:null}
  ],
  subCategories:DSUBS,
  boms:[{id:"b1",productId:"4",parts:[{partId:"1",qty:4},{partId:"2",qty:4},{partId:"3",qty:1}]}],
  sales:[{id:"s1",productId:"4",quantity:1,customer:"株式会社サンプル",date:"2026-03-22",serialNo:"SN-00001",prefecture:"大阪府大阪市",shopName:"大阪販売店",contactPerson:"田中 太郎",note:"初回納品"}],
  staff:[{code:"001",name:"渡部"},{code:"002",name:"田中"}],
  trash:[],
  orders:[]
};

function loadData(){
  try{
    const r=localStorage.getItem(SK);
    if(r){const d=JSON.parse(r);return {boms:[],sales:[],subCategories:{...DSUBS},staff:[],trash:[],orders:[],...d};}
    return JSON.parse(JSON.stringify(SAMPLE));
  }catch(e){return JSON.parse(JSON.stringify(SAMPLE));}
}
function saveData(d){try{localStorage.setItem(SK,JSON.stringify(d));}catch(e){}}
function genId(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function pad(n,l){return String(n).padStart(l,"0");}
function nowStr(){const n=new Date();return n.getFullYear()+"-"+pad(n.getMonth()+1,2)+"-"+pad(n.getDate(),2)+" "+pad(n.getHours(),2)+":"+pad(n.getMinutes(),2)+":"+pad(n.getSeconds(),2);}
function todayStr(){return new Date().toISOString().slice(0,10);}
function genSKU(items,subs,cat,sub){
  const cc=CC_MAP[cat]||"05";
  const si=sub?(subs[cat]||[]).indexOf(sub):-1;
  const sc=(sub&&si>=0)?pad(si+1,2):"00";
  const cnt=items.filter(i=>i.category===cat&&(i.subCategory||"")===(sub||"")).length;
  return cc+"-"+sc+"-"+pad(cnt+1,6);
}
function STS(q,m){
  if(q===0)return{label:"在庫切れ",color:"#ef4444",bg:"#fef2f2"};
  if(q<=m)return{label:"要補充",color:"#f59e0b",bg:"#fffbeb"};
  return{label:"正常",color:"#10b981",bg:"#ecfdf5"};
}
function catColor(cat){
  const m={"部品":"#dbeafe|#1d4ed8","製品":"#d1fae5|#065f46","消耗品":"#fef9c3|#854d0e","原材料":"#f3e8ff|#6b21a8","その他":"#f1f5f9|#475569"};
  const p=(m[cat]||m["その他"]).split("|");
  return{bg:p[0],fg:p[1]};
}
function fmtN(n){return n!=null&&n!==undefined?Number(n).toLocaleString():"—";}

function App(){
  const [data,setData]=useState(()=>loadData());
  const [view,setView]=useState("dashboard");
  const [sidebar,setSidebar]=useState(true);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({});
  const [search,setSearch]=useState("");
  const [fCat,setFCat]=useState("全て");
  const [fSub,setFSub]=useState("全て");
  const [sortKey,setSortKey]=useState("name");
  const [openCats,setOpenCats]=useState({"部品":true,"製品":true,"消耗品":true,"原材料":true,"その他":true});
  const [openSubs,setOpenSubs]=useState({});
  const [editSub,setEditSub]=useState(null);
  const [salePanelOpen,setSalePanelOpen]=useState(true);
  const [orderPanelOpen,setOrderPanelOpen]=useState(true);
  const [syncStatus,setSyncStatus]=useState("idle");
  const [invYear,setInvYear]=useState("");
  const [invMonth,setInvMonth]=useState("");
  const [invActual,setInvActual]=useState({});
  const [bomSearch,setBomSearch]=useState("");
  const [bomCat,setBomCat]=useState("全て");
  const [bomSub,setBomSub]=useState("全て");
  const nameRef=useRef(null);

  // localStorageへの保存（バックアップ）
  useEffect(()=>saveData(data),[data]);

  // ===== Firebase手動同期 =====
  function uploadToCloud(){
    setSyncStatus("saving");
    const now=new Date().toISOString();
    db.collection("inventory").doc("main").set({data:JSON.stringify(data),updatedAt:now})
      .then(()=>{localStorage.setItem("inv_sync_at",now);setSyncStatus("done");setTimeout(()=>setSyncStatus("idle"),2000);})
      .catch(e=>{console.log("upload error:",e);setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),3000);});
  }
  function downloadFromCloud(){
    setSyncStatus("loading");
    db.collection("inventory").doc("main").get()
      .then(doc=>{
        if(doc.exists){
          try{
            const d=JSON.parse(doc.data().data);
            const cu=doc.data().updatedAt||"";
            setData({boms:[],sales:[],subCategories:{...DSUBS},staff:[],trash:[],orders:[],...d});
            localStorage.setItem("inv_sync_at",cu);
            setSyncStatus("done");setTimeout(()=>setSyncStatus("idle"),2000);
          }catch(e){setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),3000);}
        }else{alert("クラウドにデータがありません。先にアップロードしてください。");setSyncStatus("idle");}
      })
      .catch(e=>{console.log("download error:",e);setSyncStatus("error");setTimeout(()=>setSyncStatus("idle"),3000);});
  }

  // ===== 受注・製造管理 =====
  function openNewOrder(){
    setForm({_ordClient:"",_ordAddr:"",_ordDate:todayStr(),_ordDeadline:"",_ordNote:"",_ordProds:[{model:"",serialNo:"",done:false}]});
    setModal({type:"order"});
  }
  function openEditOrder(ord){
    setForm({_ordClient:ord.client,_ordAddr:ord.address||"",_ordDate:ord.orderDate,_ordDeadline:ord.deadline||"",_ordNote:ord.note||"",_ordProds:ord.products.map(p=>({...p}))});
    setModal({type:"order",id:ord.id});
  }
  function saveOrder(){
    if(!(form._ordClient||"").trim()){alert("取引先を入力してください");return;}
    const prods=(form._ordProds||[]).filter(p=>(p.model||"").trim());
    if(!prods.length){alert("製品型式を1つ以上入力してください");return;}
    const base={client:form._ordClient.trim(),address:form._ordAddr||"",orderDate:form._ordDate||todayStr(),deadline:form._ordDeadline||"",note:form._ordNote||"",products:prods};
    if(modal.id){
      setData(d=>({...d,orders:(d.orders||[]).map(o=>o.id===modal.id?{...base,id:o.id,createdAt:o.createdAt}:o)}));
    }else{
      setData(d=>({...d,orders:[...(d.orders||[]),{...base,id:genId(),createdAt:nowStr()}]}));
    }
    setModal(null);
  }
  function deleteOrder(id){
    if(!confirm("この受注を削除しますか？"))return;
    setData(d=>({...d,orders:(d.orders||[]).filter(o=>o.id!==id)}));
  }
  function toggleDone(ordId,pi){
    setData(d=>({...d,orders:(d.orders||[]).map(o=>o.id!==ordId?o:{...o,products:o.products.map((p,i)=>i===pi?{...p,done:!p.done}:p)})}));
  }

  // Firestore同期：データ変更時にアップロード
  useEffect(()=>{
    const timer=setTimeout(()=>{
      try{
        db.collection("inventory").doc("main").set({
          data:JSON.stringify(data),
          updatedAt:new Date().toISOString()
        }).catch(e=>console.log("Firestore save error:",e));
      }catch(e){console.log("Firestore error:",e);}
    },1500); // 1.5秒待ってからまとめて保存
    return ()=>clearTimeout(timer);
  },[data]);

  // Firestore同期：起動時にクラウドデータを取得
  useEffect(()=>{
    const unsub=db.collection("inventory").doc("main").onSnapshot(doc=>{
      if(doc.exists){
        try{
          const cloudData=JSON.parse(doc.data().data);
          // クラウドのデータがローカルより新しければ反映
          const cloudUpdated=doc.data().updatedAt||"";
          const localUpdated=localStorage.getItem("inv_updated")||"";
          if(cloudUpdated>localUpdated){
            setData({boms:[],sales:[],subCategories:{...DSUBS},staff:[],trash:[],...cloudData});
            localStorage.setItem("inv_updated",cloudUpdated);
          }
        }catch(e){console.log("Firestore load error:",e);}
      }
    },e=>console.log("Firestore listener error:",e));
    return ()=>unsub();
  },[]);
  useEffect(()=>{if(modal&&modal.type==="item"&&nameRef.current)setTimeout(()=>nameRef.current&&nameRef.current.focus(),100);},[modal]);

  const subs=useMemo(()=>({...DSUBS,...(data.subCategories||{})}),[data.subCategories]);
  const alerts=useMemo(()=>data.items.filter(i=>i.quantity<=i.minQuantity),[data.items]);
  const products=useMemo(()=>data.items.filter(i=>i.category==="製品"),[data.items]);
  const recentTx=useMemo(()=>[...data.transactions].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,50),[data.transactions]);
  const recentSales=useMemo(()=>[...(data.sales||[])].sort((a,b)=>b.date.localeCompare(a.date)),[data.sales]);
  const subOpts=useMemo(()=>(fCat!=="全て"&&(subs[fCat]||[]).length)?(subs[fCat]||[]):[],[fCat,subs]);
  const filtered=useMemo(()=>data.items.filter(i=>{
    const mc=fCat==="全て"||i.category===fCat;
    const ms=fSub==="全て"||(i.subCategory||"")===fSub;
    const mq=!search||i.name.includes(search)||i.sku.includes(search);
    return mc&&ms&&mq;
  }).sort((a,b)=>{
    if(sortKey==="name")return a.name.localeCompare(b.name,"ja");
    if(sortKey==="asc")return a.quantity-b.quantity;
    if(sortKey==="desc")return b.quantity-a.quantity;
    return 0;
  }),[data.items,fCat,fSub,search,sortKey]);

  function iName(id){return data.items.find(i=>i.id===id)?.name||"不明";}
  function iUnit(id){return data.items.find(i=>i.id===id)?.unit||"";}
  function getBom(pid){return(data.boms||[]).find(b=>b.productId===pid);}
  function findStaff(code){return(data.staff||[]).find(s=>s.code===(code||"").trim());}

  // ===== 品目フォーム =====
  function openAdd(){
    const cat=TOPS[0];
    setForm({name:"",sku:genSKU(data.items,subs,cat,""),category:cat,subCategory:"",tags:[],quantity:0,minQuantity:10,unit:"個",location:"",notes:"",unitPrice:0,supplier:"",_count:0});
    setModal({type:"item"});
  }
  function openEdit(item){
    setForm({...item,tags:[],_count:null});
    setModal({type:"item",id:item.id});
  }
  function onCatChange(cat){setForm(p=>({...p,category:cat,subCategory:"",sku:genSKU(data.items,subs,cat,"")}));}
  function onSubChange(sub){setForm(p=>({...p,subCategory:sub,sku:genSKU(data.items,subs,p.category,sub)}));}
  function regenSKU(){
    const sub=form.subCategory||"";
    const others=data.items.filter(i=>i.id!==modal.id);
    const sku=genSKU(others,data.subCategories||subs,form.category,sub);
    setForm(p=>({...p,sku}));
    alert("商品コードを更新しました："+sku);
  }
  function saveItem(cont){
    const tags=[];
    if(!form.name){alert("品名を入力してください");return;}
    const sub=form.subCategory||"";
    const base={name:form.name,tags,quantity:Number(form.quantity)||0,minQuantity:Number(form.minQuantity)||0,subCategory:sub,category:form.category,unit:form.unit||"",location:form.location||"",notes:form.notes||"",unitPrice:Number(form.unitPrice)||0,supplier:form.supplier||""};
    if(modal.id){
      setData(d=>({...d,items:d.items.map(i=>i.id===modal.id?{...base,id:i.id,sku:i.sku}:i)}));
      setModal(null);
    }else{
      setData(d=>{
        const sku=genSKU(d.items,d.subCategories||subs,form.category,sub);
        const ni=[...d.items,{...base,id:genId(),sku}];
        if(cont){
          const nsku=genSKU(ni,d.subCategories||subs,form.category,sub);
          const nc=(form._count||0)+1;
          setForm(p=>({...p,name:"",sku:nsku,tags:"",quantity:0,notes:"",_count:nc}));
          setModal(m=>({...m,_c:nc}));
        }
        return {...d,items:ni};
      });
      if(!cont)setModal(null);
    }
  }

  // ===== 品目削除（担当者認証）=====
  function openDeleteItem(item){setForm({_diId:item.id,_diName:item.name,_diCode:"",_diStaff:null});setModal({type:"deleteItem"});}
  function onDelItemCode(code){setForm(p=>({...p,_diCode:code,_diStaff:findStaff(code)||null}));}
  function confirmDeleteItem(){
    if(!form._diStaff){alert("有効な担当者コードを入力してください");return;}
    setData(d=>({...d,items:d.items.filter(i=>i.id!==form._diId)}));
    setModal(null);
  }

  // ===== 入出庫 =====
  function openTx(item){
    setForm({_txId:item.id,_txName:item.name,_txCurPrice:item.unitPrice||0,_txCurQty:item.quantity||0,type:"in",quantity:1,date:todayStr(),note:"",inSupplier:"",inUnitPrice:""});
    setModal({type:"tx"});
  }
  function saveTx(){
    const qty=Number(form.quantity);
    if(!qty||qty<=0){alert("数量を入力してください");return;}
    const tx={id:genId(),itemId:form._txId,type:form.type,quantity:qty,date:form.date||todayStr(),note:form.note||"",inSupplier:form.type==="in"?(form.inSupplier||""):"",inUnitPrice:form.type==="in"&&form.inUnitPrice?Number(form.inUnitPrice):null};
    setData(d=>({...d,
      transactions:[...d.transactions,tx],
      items:d.items.map(i=>{
        if(i.id!==form._txId)return i;
        const newQty=form.type==="in"?i.quantity+qty:Math.max(0,i.quantity-qty);
        let newPrice=i.unitPrice||0;
        if(form.type==="in"&&form.inUnitPrice&&Number(form.inUnitPrice)>0){
          const curTotal=(i.unitPrice||0)*i.quantity;
          const newTotal=Number(form.inUnitPrice)*qty;
          newPrice=i.quantity+qty>0?Math.round((curTotal+newTotal)/(i.quantity+qty)):Number(form.inUnitPrice);
        }
        return{...i,quantity:newQty,unitPrice:newPrice};
      })
    }));
    setModal(null);
  }

  // ===== 販売 =====
  function checkStock(pid,qty){
    const bom=getBom(pid);if(!bom)return[];
    return bom.parts.flatMap(p=>{
      const it=data.items.find(i=>i.id===p.partId);if(!it)return[];
      const need=p.qty*qty;
      return it.quantity<need?[{name:it.name,have:it.quantity,need,shortage:need-it.quantity,unit:it.unit}]:[];
    });
  }
  function openSale(p){setForm({_salePid:p.id,_saleName:p.name,saleQty:1,customer:"",saleDate:todayStr(),serialNo:p.sku||"",prefecture:"",shopName:"",contactPerson:"",saleNote:""});setModal({type:"sale"});}
  function execSale(){
    const qty=Number(form.saleQty);
    if(!qty||qty<=0){alert("台数を入力してください");return;}
    if(!(form.customer||"").trim()){alert("顧客名を入力してください");return;}
    const bom=getBom(form._salePid);
    const date=form.saleDate||todayStr();
    const saleId=genId();
    // saleIdをtransactionに付与して後から特定できるようにする
    const txs=[{id:genId(),saleId,itemId:form._salePid,type:"out",quantity:qty,date,note:"販売: "+form.customer}];
    if(bom)bom.parts.forEach(p=>txs.push({id:genId(),saleId,itemId:p.partId,type:"out",quantity:p.qty*qty,date,note:"販売連動: "+form.customer}));
    const sale={id:saleId,productId:form._salePid,quantity:qty,customer:form.customer.trim(),date,serialNo:form.serialNo||"",prefecture:form.prefecture||"",shopName:form.shopName||"",contactPerson:form.contactPerson||"",note:form.saleNote||""};
    setData(d=>{
      let items=[...d.items];
      txs.forEach(tx=>{items=items.map(i=>i.id!==tx.itemId?i:{...i,quantity:Math.max(0,i.quantity-tx.quantity)});});
      return{...d,items,transactions:[...d.transactions,...txs],sales:[...(d.sales||[]),sale]};
    });
    setModal(null);
  }

  // ===== 販売削除（担当者認証）=====
  function openDeleteSale(sale){setForm({_dsId:sale.id,_dsTarget:sale,_dsCode:"",_dsStaff:null});setModal({type:"deleteSale"});}

  function confirmDeleteSale(){
    if(!form._dsStaff){alert("有効な担当者コードを入力してください");return;}
    const sale=(data.sales||[]).find(s=>s.id===form._dsId);if(!sale)return;
    const ti={...sale,deletedAt:nowStr(),deletedBy:form._dsStaff.name,deletedByCode:form._dsStaff.code};
    setData(d=>({...d,sales:d.sales.filter(s=>s.id!==form._dsId),trash:[...(d.trash||[]),ti]}));
    setModal(null);
  }
  function restoreSale(tid){
    if(!confirm("復元しますか？"))return;
    const it=(data.trash||[]).find(t=>t.id===tid);if(!it)return;
    const{deletedAt,deletedBy,deletedByCode,...sale}=it;
    setData(d=>({...d,sales:[...(d.sales||[]),sale],trash:(d.trash||[]).filter(t=>t.id!==tid)}));
  }
  function permDelete(tid){
    if(!confirm("完全削除します。在庫を元に戻して入出庫履歴も削除されます。よろしいですか？"))return;
    setData(d=>{
      const trashItem=(d.trash||[]).find(t=>t.id===tid);
      if(!trashItem)return{...d,trash:(d.trash||[]).filter(t=>t.id!==tid)};
      // saleIdに紐づくtransactionを特定
      const saleTxs=d.transactions.filter(tx=>tx.saleId===tid);
      // 在庫を戻す（出庫した分を加算）
      let items=[...d.items];
      saleTxs.forEach(tx=>{
        if(tx.type==="out"){
          items=items.map(i=>i.id!==tx.itemId?i:{...i,quantity:i.quantity+tx.quantity});
        }
      });
      // 関連transactionを削除
      const transactions=d.transactions.filter(tx=>tx.saleId!==tid);
      return{...d,items,transactions,trash:(d.trash||[]).filter(t=>t.id!==tid)};
    });
  }

    {id:"items",icon:"▦",label:"品目一覧"},
    {id:"bom",icon:"⊞",label:"製品構成 (BOM)"},
    {id:"sales",icon:"💴",label:"販売記録"},
    {id:"trash",icon:"🗑",label:"削除済み販売記録"},
    {id:"transactions",icon:"↕",label:"入出庫履歴"},
    {id:"staff",icon:"👤",label:"担当者管理"},
    {id:"orders",icon:"🏭",label:"受注・製造管理"},
    {id:"inv_sheet",icon:"📋",label:"棚卸し表"},
    {id:"settings",icon:"⚙",label:"設定"},
  ];

  const shortages=modal&&modal.type==="sale"?checkStock(form._salePid,Number(form.saleQty)||1):[];

  // 棚卸しデータ計算
  const invGroups=useMemo(()=>{
    const groups=[];
    TOPS.forEach(cat=>{
      const catItems=data.items.filter(i=>i.category===cat);
      if(!catItems.length)return;
      const catSubs=(subs[cat]||[]).filter(sub=>catItems.some(i=>i.subCategory===sub));
      catSubs.forEach(sub=>{
        const its=catItems.filter(i=>i.subCategory===sub);
        if(its.length)groups.push({cat,label:sub,items:its});
      });
      const noSub=catItems.filter(i=>!i.subCategory);
      if(noSub.length)groups.push({cat,label:"",items:noSub});
    });
    return groups;
  },[data.items,subs]);

  return(
    <div style={{fontFamily:"inherit",background:"#f8fafc",minHeight:"100vh"}}>
      <div style={{display:"flex",minHeight:"100vh"}}>

        {/* SIDEBAR */}
        <aside style={{width:sidebar?220:60,background:"#1e293b",display:"flex",flexDirection:"column",flexShrink:0,position:"sticky",top:0,height:"100vh",transition:"width 0.2s",overflow:"hidden"}}>
          <div style={{padding:sidebar?"16px 16px 12px":"16px 0 12px",borderBottom:"1px solid #334155",display:"flex",alignItems:"center",justifyContent:sidebar?"space-between":"center"}}>
            {sidebar&&<div><div style={{fontSize:10,letterSpacing:2,color:"#64748b",fontWeight:700,marginBottom:2}}>INVENTORY</div><div style={{fontSize:15,fontWeight:800,color:"#f1f5f9"}}>在庫管理</div></div>}
            <button onClick={()=>setSidebar(o=>!o)} style={{background:"#334155",border:"none",borderRadius:6,color:"#94a3b8",cursor:"pointer",fontSize:14,width:28,height:28,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{sidebar?"«":"»"}</button>
          </div>
          {sidebar&&alerts.length>0&&(
            <div style={{margin:"10px 10px 0",background:"rgba(127,29,29,0.2)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:8,padding:"8px 10px"}}>
              <div style={{fontSize:11,color:"#fca5a5",fontWeight:700,marginBottom:3}}>⚠ アラート {alerts.length}件</div>
              {alerts.slice(0,3).map(a=><div key={a.id} style={{fontSize:11,color:"#fecaca",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>・{a.name}</div>)}
            </div>
          )}
          <nav style={{flex:1,padding:"10px 0",overflowY:"auto"}}>
            {NAV.map(n=>(
              <button key={n.id} onClick={()=>setView(n.id)} title={n.label}
                style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:sidebar?"8px 16px":"10px 0",justifyContent:sidebar?"flex-start":"center",background:view===n.id?"#334155":"transparent",color:view===n.id?"#f1f5f9":"#94a3b8",border:"none",cursor:"pointer",fontSize:13,fontWeight:view===n.id?700:400,borderLeft:view===n.id?"3px solid #3b82f6":"3px solid transparent",transition:"all 0.15s"}}>
                <span style={{fontSize:14,flexShrink:0}}>{n.icon}</span>
                {sidebar&&n.label}
              </button>
            ))}
          </nav>
          {sidebar&&<div style={{padding:"10px 14px",borderTop:"1px solid #334155"}}>
            <div style={{fontSize:11,color:"#475569",marginBottom:8}}>全{data.items.length}品目 / {data.items.reduce((s,i)=>s+i.quantity,0)}在庫</div>
            <div style={{display:"flex",flexDirection:"column",gap:5}}>
              <button onClick={uploadToCloud} disabled={syncStatus==="saving"||syncStatus==="loading"}
                style={{background:syncStatus==="done"?"#10b981":syncStatus==="error"?"#ef4444":"#3b82f6",color:"#fff",border:"none",borderRadius:6,padding:"5px 8px",fontSize:11,fontWeight:700,cursor:"pointer",width:"100%"}}>
                {syncStatus==="saving"?"保存中...":syncStatus==="done"?"完了!":syncStatus==="error"?"エラー":"[up] クラウドへ保存"}
              </button>
              <button onClick={downloadFromCloud} disabled={syncStatus==="saving"||syncStatus==="loading"}
                style={{background:"#475569",color:"#fff",border:"none",borderRadius:6,padding:"5px 8px",fontSize:11,fontWeight:700,cursor:"pointer",width:"100%"}}>
                {syncStatus==="loading"?"受信中...":"[down] クラウドから取得"}
              </button>
            </div>
          </div>}
        </aside>

        {/* MAIN */}
        <main style={{flex:1,padding:22,overflow:"auto"}}>

          {/* ダッシュボード */}
          {view==="dashboard"&&(
            <div>
              <h1 style={{fontSize:20,fontWeight:800,marginBottom:16,color:"#0f172a"}}>ダッシュボード</h1>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(140px,1fr))",gap:12,marginBottom:20}}>
                {[{label:"総品目数",val:data.items.length,unit:"品目",col:"#3b82f6"},{label:"総在庫数",val:data.items.reduce((s,i)=>s+i.quantity,0),unit:"点",col:"#10b981"},{label:"製品数",val:products.length,unit:"種",col:"#8b5cf6"},{label:"要補充",val:alerts.filter(a=>a.quantity>0).length,unit:"品目",col:"#f59e0b"},{label:"在庫切れ",val:alerts.filter(a=>a.quantity===0).length,unit:"品目",col:"#ef4444"},{label:"販売件数",val:(data.sales||[]).length,unit:"件",col:"#0891b2"}].map(c=>(
                  <div key={c.label} style={{background:"#fff",borderRadius:12,padding:"14px 16px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",borderTop:"3px solid "+c.col}}>
                    <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:5,textTransform:"uppercase",letterSpacing:1}}>{c.label}</div>
                    <div style={{fontSize:26,fontWeight:800,color:c.col}}>{c.val}<span style={{fontSize:12,fontWeight:400,color:"#94a3b8",marginLeft:3}}>{c.unit}</span></div>
                  </div>
                ))}
              </div>
              {alerts.length>0&&(
                <div style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",marginBottom:18}}>
                  <h2 style={{fontSize:14,fontWeight:700,marginBottom:10,color:"#b45309"}}>⚠ 在庫アラート</h2>
                  {alerts.map(item=>{const s=STS(item.quantity,item.minQuantity);return(
                    <div key={item.id} style={{display:"flex",alignItems:"center",gap:8,padding:"7px 10px",background:s.bg,borderRadius:8,border:"1px solid "+s.color+"33",marginBottom:5}}>
                      <span style={{background:s.color,color:"#fff",borderRadius:5,padding:"1px 6px",fontSize:10,fontWeight:700,flexShrink:0}}>{s.label}</span>
                      <span style={{fontWeight:600,flex:1,fontSize:13}}>{item.name}</span>
                      <span style={{fontSize:11,color:"#64748b",whiteSpace:"nowrap"}}>{item.quantity}/{item.minQuantity}{item.unit}</span>
                      <button onClick={()=>openTx(item)} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:5,padding:"3px 8px",fontSize:11,cursor:"pointer",fontWeight:600,flexShrink:0}}>入庫</button>
                    </div>
                  );})}
                </div>
              )}
              <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",marginBottom:18,overflow:"hidden"}}>
                <div onClick={()=>setSalePanelOpen(o=>!o)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",cursor:"pointer",userSelect:"none",background:salePanelOpen?"#f0fdf4":"#fff",borderBottom:salePanelOpen?"1px solid #d1fae5":"none"}}>
                  <h2 style={{fontSize:14,fontWeight:700,color:"#065f46",margin:0}}>🛒 製品を販売する</h2>
                  <span style={{fontSize:16,color:"#10b981",fontWeight:700}}>{salePanelOpen?"▲":"▼"}</span>
                </div>
                {salePanelOpen&&(
                  <div style={{padding:"12px 16px"}}>
                    <div style={{display:"flex",flexWrap:"wrap",gap:7}}>
                      {products.map(p=>(
                        <button key={p.id} onClick={()=>openSale(p)} style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"7px 13px",cursor:"pointer",fontSize:13,fontWeight:600,color:"#065f46"}}>
                          {p.name} <span style={{color:"#94a3b8",fontWeight:400}}>在庫{p.quantity}{p.unit}</span>
                        </button>
                      ))}
                      {products.length===0&&<span style={{color:"#94a3b8",fontSize:13}}>カテゴリ「製品」の品目がありません</span>}
                    </div>
                  </div>
                )}
              </div>
              <div style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                <h2 style={{fontSize:14,fontWeight:700,marginBottom:10}}>最近の入出庫</h2>
                <div style={{overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:420}}>
                    <thead><tr><TH c="日付"/><TH c="品目"/><TH c="種別"/><TH c="数量"/><TH c="備考"/></tr></thead>
                    <tbody>{recentTx.slice(0,6).map(tx=>(
                      <tr key={tx.id} style={{borderBottom:"1px solid #f8fafc"}}>
                        <TD s={{color:"#64748b"}}>{tx.date}</TD><TD s={{fontWeight:500}}>{iName(tx.itemId)}</TD>
                        <TD>{TxB(tx.type)}</TD><TD s={{fontWeight:700}}>{tx.quantity}</TD><TD s={{color:"#64748b"}}>{tx.note}</TD>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              </div>

              {/* 受注・製造状況（折りたたみ）*/}
              {(()=>{
                const ords=data.orders||[];
                if(!ords.length)return null;
                const assembling=ords.filter(o=>o.products.some(p=>!p.done)).length;
                const waiting=ords.filter(o=>o.products.length>0&&o.products.every(p=>p.done)).length;
                return(
                  <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",marginTop:18,overflow:"hidden"}}>
                    <div onClick={()=>setOrderPanelOpen(o=>!o)} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",cursor:"pointer",userSelect:"none",background:orderPanelOpen?"#f5f3ff":"#fff",borderBottom:orderPanelOpen?"1px solid #e9d5ff":"none"}}>
                      <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                        <h2 style={{fontSize:14,fontWeight:700,color:"#6d28d9",margin:0}}>🏭 受注・製造状況</h2>
                        {assembling>0&&<span style={{background:"#f59e0b",color:"#fff",borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700}}>{assembling}件 組み立て中</span>}
                        {waiting>0&&<span style={{background:"#3b82f6",color:"#fff",borderRadius:10,padding:"1px 8px",fontSize:11,fontWeight:700}}>{waiting}件 出荷待ち</span>}
                      </div>
                      <span style={{fontSize:16,color:"#8b5cf6",fontWeight:700}}>{orderPanelOpen?"▲":"▼"}</span>
                    </div>
                    {orderPanelOpen&&(
                      <div style={{padding:"10px 14px",display:"flex",flexDirection:"column",gap:6}}>
                        {ords.slice(0,5).map(ord=>{
                          const allDone=ord.products.every(p=>p.done);
                          return(
                            <div key={ord.id} style={{display:"flex",alignItems:"center",gap:10,padding:"8px 12px",background:"#f8fafc",borderRadius:8,border:"1px solid #e2e8f0",flexWrap:"wrap"}}>
                              <span style={{background:allDone?"#3b82f6":"#f59e0b",color:"#fff",borderRadius:5,padding:"2px 8px",fontSize:11,fontWeight:700,flexShrink:0}}>{allDone?"出荷待ち":"組み立て中"}</span>
                              <span style={{fontWeight:700,fontSize:13,flex:1}}>{ord.client}</span>
                              {ord.deadline&&<span style={{fontSize:11,color:"#64748b",whiteSpace:"nowrap"}}>納期：{ord.deadline}</span>}
                              <span style={{fontSize:11,color:"#94a3b8",whiteSpace:"nowrap"}}>{ord.products.filter(p=>p.done).length}/{ord.products.length}台完了</span>
                            </div>
                          );
                        })}
                        {ords.length>5&&<div style={{fontSize:12,color:"#94a3b8",textAlign:"center"}}>他{ords.length-5}件は受注・製造管理メニューで確認</div>}
                      </div>
                    )}
                  </div>
                );
              })()}
            </div>
          )}

          {/* 品目登録・削除 */}
          {view==="register"&&(
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
                <div><h1 style={{fontSize:20,fontWeight:800,color:"#0f172a"}}>品目登録・削除</h1><p style={{fontSize:13,color:"#64748b",marginTop:2}}>品目の新規登録・編集・削除はこちらから行えます。</p></div>
                <button onClick={openAdd} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",fontSize:14,fontWeight:700,cursor:"pointer"}}>＋ 新規品目を登録</button>
              </div>
              {data.items.length===0&&(
                <div style={{background:"#fff",borderRadius:12,padding:40,textAlign:"center",color:"#94a3b8",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                  <div style={{fontSize:40,marginBottom:12}}>📦</div>
                  <div style={{fontSize:15,fontWeight:600,marginBottom:12}}>品目が登録されていません</div>
                  <button onClick={openAdd} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}}>＋ 新規品目を登録</button>
                </div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:12}}>
                {TOPS.map(cat=>{
                  const ci=data.items.filter(i=>i.category===cat);
                  if(!ci.length)return null;
                  const c=catColor(cat);
                  return(
                    <div key={cat} style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
                      <div style={{padding:"10px 16px",background:c.bg,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                        <span style={{fontWeight:800,fontSize:14,color:c.fg}}>{cat}</span>
                        <span style={{fontSize:12,color:c.fg,opacity:0.7}}>{ci.length}品目</span>
                      </div>
                      <div style={{overflowX:"auto"}}>
                        <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:600}}>
                          <thead style={{background:"#f8fafc"}}><tr><TH c="商品コード"/><TH c="品名"/><TH c="小カテゴリ"/><TH c="単価"/><TH c="数量"/><TH c="操作"/></tr></thead>
                          <tbody>{ci.map((item,idx)=>(
                            <tr key={item.id} style={{borderBottom:"1px solid #f8fafc",background:idx%2===0?"#fff":"#fafafa"}}>
                              <TD s={{fontFamily:"monospace",fontSize:12,color:"#475569",fontWeight:600}}>{item.sku}</TD>
                              <TD s={{fontWeight:600}}>{item.name}</TD>
                              <TD>{SubB(item.subCategory)}</TD>
                              <TD s={{textAlign:"right"}}>{item.unitPrice?item.unitPrice.toLocaleString()+"円":"—"}</TD>
                              <TD s={{fontWeight:700}}>{item.quantity}<span style={{fontSize:11,fontWeight:400,color:"#94a3b8",marginLeft:2}}>{item.unit}</span></TD>
                              <TD><div style={{display:"flex",gap:4}}>{(item.category==="製品"||item.category==="部品")&&SBtn("販売",()=>openSale(item),"#f0fdf4","#065f46")}{SBtn("編集",()=>openEdit(item),"#f1f5f9","#475569")}{SBtn("削除",()=>openDeleteItem(item),"#fee2e2","#ef4444")}</div></TD>
                            </tr>
                          ))}</tbody>
                        </table>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* カテゴリ別一覧 */}
          {view==="category"&&(
            <div>
              <h1 style={{fontSize:20,fontWeight:800,marginBottom:4,color:"#0f172a"}}>カテゴリ別一覧</h1>
              <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>大カテゴリ・小カテゴリごとに展開・折りたたみで確認できます。</p>
              <div style={{display:"flex",flexDirection:"column",gap:10}}>
                {TOPS.map(cat=>{
                  const ci=data.items.filter(i=>i.category===cat);
                  if(!ci.length)return null;
                  const isOpen=openCats[cat]!==false;
                  const c=catColor(cat);
                  const catSubs=(subs[cat]||[]).filter(sub=>ci.some(i=>i.subCategory===sub));
                  const noSub=ci.filter(i=>!i.subCategory);
                  return(
                    <div key={cat} style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden"}}>
                      <div onClick={()=>setOpenCats(o=>({...o,[cat]:!isOpen}))} style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"12px 16px",cursor:"pointer",background:c.bg,userSelect:"none"}}>
                        <div style={{display:"flex",alignItems:"center",gap:10}}>
                          <span style={{fontSize:15}}>{isOpen?"▼":"▶"}</span>
                          <span style={{fontWeight:800,fontSize:15,color:c.fg}}>{cat}</span>
                          <span style={{fontSize:12,color:c.fg,opacity:0.7}}>{ci.length}品目 / {ci.reduce((s,i)=>s+i.quantity,0)}点</span>
                        </div>
                      </div>
                      {isOpen&&(
                        <div>
                          {catSubs.map(sub=>{
                            const si=ci.filter(i=>i.subCategory===sub);
                            const key=cat+"|"+sub;
                            const so=openSubs[key]!==false;
                            return(
                              <div key={sub}>
                                <div onClick={()=>setOpenSubs(o=>({...o,[key]:!so}))} style={{display:"flex",alignItems:"center",gap:8,padding:"8px 20px",cursor:"pointer",background:"#f8fafc",userSelect:"none"}}>
                                  <span style={{fontSize:12,color:"#64748b"}}>{so?"▼":"▶"}</span>
                                  <span style={{fontWeight:700,fontSize:13,color:"#334155"}}>{sub}</span>
                                  <span style={{fontSize:11,color:"#94a3b8"}}>{si.length}品目</span>
                                  {si.some(i=>i.quantity<=i.minQuantity)&&<span style={{fontSize:10,background:"#fef2f2",color:"#ef4444",borderRadius:4,padding:"1px 6px",fontWeight:700}}>要確認</span>}
                                </div>
                                {so&&<div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:560}}>
                                  <thead style={{background:"#f1f5f9"}}><tr><TH c="品名"/><TH c="SKU"/><TH c="数量"/><TH c="ステータス"/><TH c="場所"/><TH c="操作"/></tr></thead>
                                  <tbody>{si.map((item,idx)=>(
                                    <tr key={item.id} style={{borderBottom:"1px solid #f8fafc",background:idx%2===0?"#fff":"#fafafa"}}>
                                      <TD s={{fontWeight:600}}>{item.name}</TD><TD s={{fontSize:11,color:"#94a3b8",fontFamily:"monospace"}}>{item.sku}</TD>
                                      <TD s={{fontWeight:700}}>{item.quantity}<span style={{fontSize:11,fontWeight:400,color:"#94a3b8",marginLeft:2}}>{item.unit}</span></TD>
                                      <TD>{SBadge(item)}</TD><TD s={{color:"#64748b",fontSize:12}}>{item.location}</TD>
                                      <TD><div style={{display:"flex",gap:4}}>{(item.category==="製品"||item.category==="部品")&&SBtn("販売",()=>openSale(item),"#f0fdf4","#065f46")}{SBtn("入出庫",()=>openTx(item),"#10b981")}{SBtn("編集",()=>openEdit(item),"#f1f5f9","#475569")}</div></TD>
                                    </tr>
                                  ))}</tbody>
                                </table></div>}
                              </div>
                            );
                          })}
                          {noSub.length>0&&(
                            <div>
                              <div style={{padding:"8px 20px",background:"#f8fafc"}}><span style={{fontWeight:700,fontSize:13,color:"#94a3b8"}}>— 小カテゴリなし</span><span style={{fontSize:11,color:"#94a3b8",marginLeft:8}}>{noSub.length}品目</span></div>
                              <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:560}}>
                                <thead style={{background:"#f1f5f9"}}><tr><TH c="品名"/><TH c="SKU"/><TH c="数量"/><TH c="ステータス"/><TH c="場所"/><TH c="操作"/></tr></thead>
                                <tbody>{noSub.map((item,idx)=>(
                                  <tr key={item.id} style={{borderBottom:"1px solid #f8fafc",background:idx%2===0?"#fff":"#fafafa"}}>
                                    <TD s={{fontWeight:600}}>{item.name}</TD><TD s={{fontSize:11,color:"#94a3b8",fontFamily:"monospace"}}>{item.sku}</TD>
                                    <TD s={{fontWeight:700}}>{item.quantity}<span style={{fontSize:11,fontWeight:400,color:"#94a3b8",marginLeft:2}}>{item.unit}</span></TD>
                                    <TD>{SBadge(item)}</TD><TD s={{color:"#64748b",fontSize:12}}>{item.location}</TD>
                                    <TD><div style={{display:"flex",gap:4}}>{(item.category==="製品"||item.category==="部品")&&SBtn("販売",()=>openSale(item),"#f0fdf4","#065f46")}{SBtn("入出庫",()=>openTx(item),"#10b981")}{SBtn("編集",()=>openEdit(item),"#f1f5f9","#475569")}</div></TD>
                                  </tr>
                                ))}</tbody>
                              </table></div>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 品目一覧 */}
          {view==="items"&&(
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
                <h1 style={{fontSize:20,fontWeight:800,color:"#0f172a"}}>品目一覧</h1>
                <button onClick={openAdd} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"7px 15px",fontSize:13,fontWeight:700,cursor:"pointer"}}>＋ 品目を追加</button>
              </div>
              <div style={{display:"flex",gap:7,marginBottom:12,flexWrap:"wrap"}}>
                <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="品名・SKU・タグで検索…" style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 12px",fontSize:13,flex:"1 1 160px",outline:"none",background:"#fff"}}/>
                <select value={fCat} onChange={e=>{setFCat(e.target.value);setFSub("全て");}} style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 10px",fontSize:13,background:"#fff",cursor:"pointer"}}>
                  <option>全て</option>{TOPS.map(c=><option key={c}>{c}</option>)}
                </select>
                {subOpts.length>0&&<select value={fSub} onChange={e=>setFSub(e.target.value)} style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 10px",fontSize:13,background:"#fff",cursor:"pointer"}}><option value="全て">全ての{fCat}</option>{subOpts.map(s=><option key={s}>{s}</option>)}</select>}
                <select value={sortKey} onChange={e=>setSortKey(e.target.value)} style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 10px",fontSize:13,background:"#fff",cursor:"pointer"}}>
                  <option value="name">名前順</option><option value="asc">数量少ない順</option><option value="desc">数量多い順</option>
                </select>
              </div>
              <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:900}}>
                  <thead style={{background:"#f8fafc"}}><tr><TH c="品名 / SKU"/><TH c="大カテゴリ"/><TH c="小カテゴリ"/><TH c="単価"/><TH c="数量"/><TH c="ステータス"/><TH c="場所"/><TH c="操作"/></tr></thead>
                  <tbody>{filtered.map((item,idx)=>{
                    const c=catColor(item.category);
                    return(
                      <tr key={item.id} style={{borderBottom:"1px solid #f8fafc",background:idx%2===0?"#fff":"#fafafa"}}>
                        <TD><div style={{fontWeight:600}}>{item.name}</div><div style={{fontSize:11,color:"#94a3b8",fontFamily:"monospace"}}>{item.sku}</div></TD>
                        <TD><span style={{background:c.bg,color:c.fg,borderRadius:4,padding:"1px 7px",fontSize:11,fontWeight:600}}>{item.category}</span></TD>
                        <TD>{SubB(item.subCategory)}</TD>
                        <TD s={{textAlign:"right"}}>{item.unitPrice?item.unitPrice.toLocaleString()+"円":"—"}</TD>
                        <TD s={{fontWeight:700}}>{item.quantity}<span style={{fontSize:11,fontWeight:400,color:"#94a3b8",marginLeft:2}}>{item.unit}</span></TD>
                        <TD>{SBadge(item)}</TD>
                        <TD s={{color:"#64748b",fontSize:12}}>{item.location}</TD>
                        <TD><div style={{display:"flex",gap:4}}>
                          {(item.category==="製品"||item.category==="部品")&&SBtn("販売",()=>openSale(item),"#f0fdf4","#065f46")}
                          {SBtn("入出庫",()=>openTx(item),"#10b981")}
                          {SBtn("編集",()=>openEdit(item),"#f1f5f9","#475569")}
                          {SBtn("削除",()=>openDeleteItem(item),"#fee2e2","#ef4444")}
                        </div></TD>
                      </tr>
                    );
                  })}</tbody>
                </table>
                {filtered.length===0&&<div style={{color:"#94a3b8",textAlign:"center",padding:28}}>品目が見つかりません</div>}
              </div>
            </div>
          )}

          {/* 製品構成BOM */}
          {view==="bom"&&(
            <div>
              <h1 style={{fontSize:20,fontWeight:800,marginBottom:4,color:"#0f172a"}}>製品構成 (BOM)</h1>
              <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>製品1台に必要な部品を登録すると、販売時に在庫が自動で引かれます。</p>
              {products.length===0&&<div style={{background:"#fff",borderRadius:12,padding:24,color:"#94a3b8",textAlign:"center",fontSize:13}}>カテゴリ「製品」の品目がありません。</div>}
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {products.map(product=>{
                  const bom=getBom(product.id);
                  return(
                    <div key={product.id} style={{background:"#fff",borderRadius:12,padding:16,boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10,flexWrap:"wrap",gap:6}}>
                        <div><span style={{fontWeight:700,fontSize:15}}>{product.name}</span><span style={{fontSize:12,color:"#94a3b8",marginLeft:8,fontFamily:"monospace"}}>{product.sku}</span>{bom&&<span style={{fontSize:11,color:"#64748b",marginLeft:8}}>部品 {bom.parts.length}点</span>}</div>
                        <div style={{display:"flex",gap:7}}>
                          <button onClick={()=>openSale(product)} style={{background:"#f0fdf4",color:"#065f46",border:"1px solid #bbf7d0",borderRadius:7,padding:"5px 11px",fontSize:12,cursor:"pointer",fontWeight:700}}>🛒 販売</button>
                          <button onClick={()=>openBom(product.id)} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:7,padding:"5px 11px",fontSize:12,cursor:"pointer",fontWeight:700}}>{bom?"✎ 編集":"＋ 登録"}</button>
                        </div>
                      </div>
                      {bom?(
                        <div style={{overflowX:"auto"}}><table style={{width:"100%",borderCollapse:"collapse",fontSize:12,minWidth:400}}>
                          <thead><tr style={{background:"#f8fafc"}}><TH c="部品名"/><TH c="カテゴリ"/><TH c="必要数"/><TH c="現在庫"/><TH c="状態"/></tr></thead>
                          <tbody>{bom.parts.map((p,i)=>{
                            const it=data.items.find(x=>x.id===p.partId);
                            const ok=it&&it.quantity>=p.qty;
                            return(
                              <tr key={i} style={{borderBottom:"1px solid #f8fafc"}}>
                                <TD s={{fontWeight:500}}>{it?it.name:"不明"}</TD>
                                <TD s={{fontSize:11,color:"#64748b"}}>{it?(it.category+(it.subCategory?" › "+it.subCategory:"")):"—"}</TD>
                                <TD>{p.qty}{it?it.unit:""}</TD><TD>{it?it.quantity:"—"}{it?it.unit:""}</TD>
                                <TD><span style={{background:ok?"#d1fae5":"#fee2e2",color:ok?"#065f46":"#991b1b",borderRadius:4,padding:"1px 6px",fontSize:11,fontWeight:700}}>{ok?"OK":"不足"}</span></TD>
                              </tr>
                            );
                          })}</tbody>
                        </table></div>
                      ):(
                        <div style={{color:"#94a3b8",fontSize:13}}>BOM未登録。「＋ 登録」から部品構成を設定してください。</div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 販売記録 */}
          {view==="sales"&&(
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
                <h1 style={{fontSize:20,fontWeight:800,color:"#0f172a"}}>販売記録</h1>
                <button onClick={exportCSV} style={{background:"#10b981",color:"#fff",border:"none",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>📊 CSVエクスポート</button>
              </div>
              <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:1000}}>
                  <thead style={{background:"#f8fafc"}}><tr><TH c="日付"/><TH c="製品"/><TH c="数量"/><TH c="商品コード"/><TH c="顧客名"/><TH c="都道府県・市町村"/><TH c="販売店名"/><TH c="取引先担当者"/><TH c="備考"/><TH c="操作"/></tr></thead>
                  <tbody>{recentSales.map((s,idx)=>(
                    <tr key={s.id} style={{borderBottom:"1px solid #f8fafc",background:idx%2===0?"#fff":"#fafafa"}}>
                      <TD s={{color:"#64748b"}}>{s.date}</TD><TD s={{fontWeight:600}}>{iName(s.productId)}</TD>
                      <TD s={{fontWeight:700}}>{s.quantity}{iUnit(s.productId)}</TD>
                      <TD>{s.serialNo||"—"}</TD><TD s={{fontWeight:600}}>{s.customer}</TD>
                      <TD>{s.prefecture||"—"}</TD><TD>{s.shopName||"—"}</TD><TD>{s.contactPerson||"—"}</TD>
                      <TD s={{color:"#64748b"}}>{s.note}</TD>
                      <TD>{SBtn("削除",()=>openDeleteSale(s),"#fee2e2","#ef4444")}</TD>
                    </tr>
                  ))}</tbody>
                </table>
                {recentSales.length===0&&<div style={{color:"#94a3b8",textAlign:"center",padding:28}}>販売記録がありません</div>}
              </div>
            </div>
          )}

          {/* ゴミ箱 */}
          {view==="trash"&&(
            <div>
              <h1 style={{fontSize:20,fontWeight:800,marginBottom:4,color:"#0f172a"}}>🗑 削除済み販売記録</h1>
              <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>削除された販売記録の一覧です。復元または完全削除できます。</p>
              {(data.trash||[]).length===0?(
                <div style={{background:"#fff",borderRadius:12,padding:40,textAlign:"center",color:"#94a3b8",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}><div style={{fontSize:40,marginBottom:12}}>🗑</div><div style={{fontSize:15,fontWeight:600}}>削除済みの記録はありません</div></div>
              ):(
                <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflowX:"auto"}}>
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:900}}>
                    <thead style={{background:"#f8fafc"}}><tr><TH c="削除日時"/><TH c="削除担当者"/><TH c="販売日"/><TH c="製品"/><TH c="数量"/><TH c="顧客名"/><TH c="商品コード"/><TH c="操作"/></tr></thead>
                    <tbody>{[...(data.trash||[])].sort((a,b)=>b.deletedAt.localeCompare(a.deletedAt)).map((t,idx)=>(
                      <tr key={t.id} style={{borderBottom:"1px solid #f8fafc",background:idx%2===0?"#fff":"#fef2f2"}}>
                        <TD s={{color:"#ef4444",fontSize:12,fontWeight:600}}>{t.deletedAt}</TD>
                        <TD s={{fontWeight:700,color:"#7f1d1d"}}>{t.deletedBy}</TD>
                        <TD s={{color:"#64748b"}}>{t.date}</TD><TD s={{fontWeight:600}}>{iName(t.productId)}</TD>
                        <TD s={{fontWeight:700}}>{t.quantity}{iUnit(t.productId)}</TD><TD>{t.customer}</TD><TD>{t.serialNo||"—"}</TD>
                        <TD><div style={{display:"flex",gap:4}}>{SBtn("復元",()=>restoreSale(t.id),"#d1fae5","#065f46")}{SBtn("完全削除",()=>permDelete(t.id),"#fee2e2","#ef4444")}</div></TD>
                      </tr>
                    ))}</tbody>
                  </table>
                </div>
              )}
            </div>
          )}

          {/* 入出庫履歴 */}
          {view==="transactions"&&(
            <div>
              <h1 style={{fontSize:20,fontWeight:800,marginBottom:16,color:"#0f172a"}}>入出庫履歴</h1>
              <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,minWidth:500}}>
                  <thead style={{background:"#f8fafc"}}><tr><TH c="日付"/><TH c="品目"/><TH c="種別"/><TH c="数量"/><TH c="仕入先"/><TH c="仕入単価"/><TH c="備考"/></tr></thead>
                  <tbody>{recentTx.map((tx,idx)=>(
                    <tr key={tx.id} style={{borderBottom:"1px solid #f8fafc",background:idx%2===0?"#fff":"#fafafa"}}>
                      <TD s={{color:"#64748b"}}>{tx.date}</TD><TD s={{fontWeight:600}}>{iName(tx.itemId)}</TD>
                      <TD>{TxB(tx.type)}</TD><TD s={{fontWeight:700}}>{tx.quantity}</TD>
                      <TD s={{color:"#64748b"}}>{tx.inSupplier||"—"}</TD>
                      <TD s={{textAlign:"right"}}>{tx.inUnitPrice?tx.inUnitPrice.toLocaleString()+"円":"—"}</TD>
                      <TD s={{color:"#64748b"}}>{tx.note}</TD>
                    </tr>
                  ))}</tbody>
                </table>
                {recentTx.length===0&&<div style={{color:"#94a3b8",textAlign:"center",padding:28}}>履歴がありません</div>}
              </div>
            </div>
          )}

          {/* 担当者管理 */}
          {view==="staff"&&(
            <div>
              <h1 style={{fontSize:20,fontWeight:800,marginBottom:4,color:"#0f172a"}}>👤 担当者管理</h1>
              <p style={{fontSize:13,color:"#64748b",marginBottom:16}}>担当者コードと名前を登録します。品目削除・販売記録削除時に使用します。</p>
              <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",marginBottom:20,maxWidth:440}}>
                <h2 style={{fontSize:15,fontWeight:700,marginBottom:14}}>新規担当者を登録</h2>
                <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:14}}>
                  <div>{lbl("担当者コード（例：001）")}<input value={form._sc||""} onChange={e=>setForm(p=>({...p,_sc:e.target.value}))} placeholder="例：001" maxLength={10} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,outline:"none",fontFamily:"monospace",letterSpacing:1}}/></div>
                  <div>{lbl("担当者名")}<input value={form._snm||""} onChange={e=>setForm(p=>({...p,_snm:e.target.value}))} placeholder="例：渡部" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,outline:"none"}}/></div>
                </div>
                <button onClick={addStaff} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}}>＋ 登録</button>
              </div>
              <div style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",maxWidth:440}}>
                <div style={{padding:"12px 16px",borderBottom:"2px solid #f1f5f9"}}><span style={{fontWeight:700,fontSize:14}}>登録済み担当者</span><span style={{fontSize:12,color:"#94a3b8",marginLeft:8}}>{(data.staff||[]).length}名</span></div>
                {(data.staff||[]).length===0?<div style={{padding:28,textAlign:"center",color:"#94a3b8",fontSize:13}}>担当者が登録されていません</div>:(
                  <table style={{width:"100%",borderCollapse:"collapse",fontSize:13}}>
                    <thead style={{background:"#f8fafc"}}><tr><TH c="コード"/><TH c="担当者名"/><TH c="操作"/></tr></thead>
                    <tbody>{(data.staff||[]).map((s,idx)=>(
                      <tr key={s.code} style={{borderBottom:"1px solid #f8fafc",background:idx%2===0?"#fff":"#fafafa"}}>
                        <TD s={{fontFamily:"monospace",fontWeight:700,color:"#3b82f6",fontSize:14}}>{s.code}</TD>
                        <TD s={{fontWeight:600}}>{s.name}</TD>
                        <TD>{SBtn("削除",()=>deleteStaff(s.code),"#fee2e2","#ef4444")}</TD>
                      </tr>
                    ))}</tbody>
                  </table>
                )}
              </div>
            </div>
          )}

          {/* 受注・製造管理 */}
          {view==="orders"&&(
            <div>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:16,flexWrap:"wrap",gap:8}}>
                <div>
                  <h1 style={{fontSize:20,fontWeight:800,color:"#0f172a"}}>🏭 受注・製造管理</h1>
                  <p style={{fontSize:13,color:"#64748b",marginTop:2}}>受注ごとに製品の製造状況を管理します。</p>
                </div>
                <button onClick={openNewOrder} style={{background:"#8b5cf6",color:"#fff",border:"none",borderRadius:8,padding:"9px 18px",fontSize:14,fontWeight:700,cursor:"pointer"}}>＋ 新規受注を登録</button>
              </div>
              {(data.orders||[]).length>0&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(130px,1fr))",gap:10,marginBottom:16}}>
                  {[{label:"受注総数",val:(data.orders||[]).length,unit:"件",col:"#8b5cf6"},{label:"組み立て中",val:(data.orders||[]).filter(o=>o.products.some(p=>!p.done)).length,unit:"件",col:"#f59e0b"},{label:"出荷待ち",val:(data.orders||[]).filter(o=>o.products.length>0&&o.products.every(p=>p.done)).length,unit:"件",col:"#3b82f6"}].map(c=>(
                    <div key={c.label} style={{background:"#fff",borderRadius:12,padding:"12px 14px",boxShadow:"0 1px 4px rgba(0,0,0,0.06)",borderTop:"3px solid "+c.col}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>{c.label}</div>
                      <div style={{fontSize:24,fontWeight:800,color:c.col}}>{c.val}<span style={{fontSize:12,fontWeight:400,color:"#94a3b8",marginLeft:3}}>{c.unit}</span></div>
                    </div>
                  ))}
                </div>
              )}
              {(data.orders||[]).length===0&&(
                <div style={{background:"#fff",borderRadius:12,padding:40,textAlign:"center",color:"#94a3b8",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
                  <div style={{fontSize:40,marginBottom:12}}>🏭</div>
                  <div style={{fontSize:15,fontWeight:600,marginBottom:12}}>受注が登録されていません</div>
                  <button onClick={openNewOrder} style={{background:"#8b5cf6",color:"#fff",border:"none",borderRadius:8,padding:"8px 20px",fontSize:13,fontWeight:700,cursor:"pointer"}}>＋ 新規受注を登録</button>
                </div>
              )}
              <div style={{display:"flex",flexDirection:"column",gap:14}}>
                {[...(data.orders||[])].sort((a,b)=>b.createdAt.localeCompare(a.createdAt)).map(ord=>{
                  const allDone=ord.products.every(p=>p.done);
                  return(
                    <div key={ord.id} style={{background:"#fff",borderRadius:12,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",overflow:"hidden",border:"1px solid "+(allDone?"#bfdbfe":"#fde68a")}}>
                      <div style={{padding:"12px 16px",background:allDone?"#eff6ff":"#fffbeb",display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:8}}>
                        <div style={{display:"flex",alignItems:"center",gap:10,flexWrap:"wrap"}}>
                          <span style={{background:allDone?"#3b82f6":"#f59e0b",color:"#fff",borderRadius:6,padding:"3px 10px",fontSize:12,fontWeight:700}}>{allDone?"出荷待ち":"組み立て中"}</span>
                          <span style={{fontWeight:800,fontSize:15}}>{ord.client}</span>
                          {ord.deadline&&<span style={{fontSize:12,color:"#64748b"}}>納期：<strong>{ord.deadline}</strong></span>}
                        </div>
                        <div style={{display:"flex",gap:6}}>
                          {SBtn("✎ 編集",()=>openEditOrder(ord),"#f1f5f9","#475569")}
                          {SBtn("削除",()=>deleteOrder(ord.id),"#fee2e2","#ef4444")}
                        </div>
                      </div>
                      <div style={{padding:"12px 16px"}}>
                        <div style={{display:"flex",gap:14,flexWrap:"wrap",marginBottom:10,fontSize:13}}>
                          <span><span style={{color:"#64748b"}}>受注日：</span>{ord.orderDate}</span>
                          {ord.address&&<span><span style={{color:"#64748b"}}>納品先：</span>{ord.address}</span>}
                          {ord.note&&<span><span style={{color:"#64748b"}}>備考：</span>{ord.note}</span>}
                        </div>
                        <div style={{fontSize:12,fontWeight:700,color:"#475569",marginBottom:6}}>製品一覧（{ord.products.filter(p=>p.done).length}/{ord.products.length}台完了）</div>
                        <div style={{display:"flex",flexDirection:"column",gap:5}}>
                          {ord.products.map((p,pi)=>(
                            <div key={pi} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 12px",borderRadius:8,background:p.done?"#f0fdf4":"#fafafa",border:"1px solid "+(p.done?"#bbf7d0":"#e2e8f0")}}>
                              <button onClick={()=>toggleDone(ord.id,pi)}
                                style={{width:24,height:24,borderRadius:5,border:"2px solid "+(p.done?"#10b981":"#cbd5e1"),background:p.done?"#10b981":"#fff",color:"#fff",cursor:"pointer",fontWeight:800,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                                {p.done?"✓":""}
                              </button>
                              <div style={{flex:1}}>
                                <span style={{fontWeight:700,color:p.done?"#065f46":"#1e293b"}}>{p.model}</span>
                                {p.serialNo&&<span style={{fontSize:11,color:"#64748b",marginLeft:8,fontFamily:"monospace"}}>No.{p.serialNo}</span>}
                              </div>
                              <span style={{fontSize:11,fontWeight:700,color:p.done?"#10b981":"#f59e0b",flexShrink:0,whiteSpace:"nowrap"}}>{p.done?"✓ 完了":"⚙ 組み立て中"}</span>
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* 棚卸し表 */}
          {view==="inv_sheet"&&(
            <div>
              <div className="no-print">
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:10}}>
                  <div><h1 style={{fontSize:20,fontWeight:800,color:"#0f172a"}}>📋 棚卸し表</h1><p style={{fontSize:13,color:"#64748b",marginTop:2}}>年月を選択して印刷してください。実在庫欄はPC上で入力できます。</p></div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={()=>setInvActual({})} style={{background:"#f1f5f9",color:"#475569",border:"none",borderRadius:8,padding:"8px 14px",fontSize:13,fontWeight:700,cursor:"pointer"}}>入力をリセット</button>
                    <button onClick={openPrintWindow} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"8px 18px",fontSize:14,fontWeight:700,cursor:"pointer"}}>🖨 印刷する</button>
                  </div>
                </div>

                  <span style={{fontSize:13}}>年</span>
                  <select value={invMonth} onChange={e=>setInvMonth(e.target.value)} style={{border:"1px solid #e2e8f0",borderRadius:8,padding:"6px 10px",fontSize:14,background:"#fff",cursor:"pointer"}}>
