                    {["01","02","03","04","05","06","07","08","09","10","11","12"].map(m=><option key={m} value={m}>{Number(m)}月</option>)}
                  </select>
                  {invYear&&invMonth&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"5px 12px",fontSize:14,fontWeight:700,color:"#065f46"}}>令和{invYear}年{Number(invMonth)}月分</div>}
                </div>
              </div>

              <div id="print-area">
                <div style={{textAlign:"center",marginBottom:10,paddingTop:4}}>
                  <div style={{fontSize:18,fontWeight:800,letterSpacing:1,marginBottom:3}}>令和{invYear||"　　"}年{invMonth?Number(invMonth)+"月":"　　月"}分　棚卸し表</div>
                  <div style={{fontSize:11,color:"#64748b"}}>作成日：{new Date().toLocaleDateString("ja-JP",{year:"numeric",month:"long",day:"numeric"})}　　総品目数：{data.items.length}品目</div>
                </div>

                <table style={{width:"100%",borderCollapse:"collapse",fontSize:11,tableLayout:"fixed"}}>
                  <colgroup>
                    <col style={{width:"11%"}}/><col style={{width:"16%"}}/><col style={{width:"8%"}}/><col style={{width:"7%"}}/><col style={{width:"4%"}}/>
                    <col style={{width:"7%"}}/><col style={{width:"9%"}}/><col style={{width:"9%"}}/><col style={{width:"9%"}}/><col style={{width:"9%"}}/><col style={{width:"11%"}}/>
                  </colgroup>
                  <thead>
                    <tr style={{background:"#1e293b",color:"#fff"}}>
                      <th style={{border:"1px solid #334155",padding:"4px 5px",fontSize:9,textAlign:"left"}}>商品コード</th>
                      <th style={{border:"1px solid #334155",padding:"4px 5px",fontSize:9,textAlign:"left"}}>品名</th>
                      <th style={{border:"1px solid #334155",padding:"4px 5px",fontSize:9,textAlign:"left"}}>小カテゴリ</th>
                      <th style={{border:"1px solid #334155",padding:"4px 5px",fontSize:9,textAlign:"right"}}>単価(円)</th>
                      <th style={{border:"1px solid #334155",padding:"4px 5px",fontSize:9,textAlign:"center"}}>単位</th>
                      <th style={{border:"1px solid #334155",padding:"4px 5px",fontSize:9,textAlign:"right"}}>現在庫</th>
                      <th style={{border:"1px solid #334155",padding:"4px 5px",fontSize:9,textAlign:"right"}}>現在庫小計</th>
                      <th style={{border:"1px solid #334155",padding:"4px 5px",fontSize:9,textAlign:"center",background:"#d97706"}}>実在庫</th>
                      <th style={{border:"1px solid #334155",padding:"4px 5px",fontSize:9,textAlign:"right",background:"#d97706"}}>実在庫小計</th>
                      <th style={{border:"1px solid #334155",padding:"4px 5px",fontSize:9,textAlign:"right",background:"#475569"}}>差額</th>
                      <th style={{border:"1px solid #334155",padding:"4px 5px",fontSize:9,textAlign:"left"}}>備考</th>
                    </tr>
                  </thead>
                  <tbody>
                    {(()=>{
                      const rows=[];
                      let prevCat="";
                      invGroups.forEach((grp,gi)=>{
                        if(grp.cat!==prevCat){
                          if(prevCat){
                            const its=data.items.filter(i=>i.category===prevCat);
                            const cCur=its.reduce((s,i)=>s+(i.unitPrice||0)*i.quantity,0);
                            const cAct=its.reduce((s,i)=>{const a=invActual[i.id];if(a===undefined||a==="")return s;return s+(i.unitPrice||0)*Number(a);},0);
                            const cActQ=its.reduce((s,i)=>{const a=invActual[i.id];return s+(a!==undefined&&a!==""?Number(a):0);},0);
                            rows.push(<tr key={"ct_"+prevCat} style={{background:"#1e293b"}}>
                              <td colSpan={5} style={{border:"1px solid #334155",padding:"4px 8px",fontWeight:800,fontSize:10,color:"#f1f5f9",textAlign:"right"}}>{prevCat} 合計</td>
                              <td style={{border:"1px solid #334155",padding:"4px 5px",textAlign:"right",fontWeight:800,fontSize:10,color:"#fbbf24"}}>{its.reduce((s,i)=>s+i.quantity,0).toLocaleString()}</td>
                              <td style={{border:"1px solid #334155",padding:"4px 5px",textAlign:"right",fontWeight:800,fontSize:10,color:"#fbbf24"}}>{cCur>0?cCur.toLocaleString()+"円":"—"}</td>
                              <td style={{border:"1px solid #334155",padding:"4px 5px",textAlign:"right",fontWeight:800,fontSize:10,color:"#fbbf24"}}>{cActQ>0?cActQ.toLocaleString():"—"}</td>
                              <td style={{border:"1px solid #334155",padding:"4px 5px",textAlign:"right",fontWeight:800,fontSize:10,color:"#fbbf24"}}>{cAct>0?cAct.toLocaleString()+"円":"—"}</td>
                              <td style={{border:"1px solid #334155",padding:"4px 5px",textAlign:"right",fontWeight:800,fontSize:10,color:cAct>0?(cAct-cCur>=0?"#fbbf24":"#f87171"):"#94a3b8"}}>{cAct>0?((cAct-cCur>=0?"+":"")+(cAct-cCur).toLocaleString()+"円"):"—"}</td>
                              <td style={{border:"1px solid #334155"}}></td>
                            </tr>);
                          }
                          rows.push(<tr key={"ch_"+grp.cat+gi} style={{background:"#334155"}}><td colSpan={11} style={{border:"1px solid #475569",padding:"4px 8px",fontWeight:800,fontSize:11,color:"#f1f5f9",letterSpacing:1}}>{grp.cat}</td></tr>);
                          prevCat=grp.cat;
                        }
                        if(grp.label)rows.push(<tr key={"sh_"+gi} style={{background:"#e2e8f0"}}><td colSpan={11} style={{border:"1px solid #cbd5e1",padding:"3px 10px",fontWeight:700,fontSize:10,color:"#334155"}}>　▶ {grp.label}</td></tr>);
                        grp.items.forEach((item,idx)=>{
                          const a=invActual[item.id];
                          const an=a!==undefined&&a!==""?Number(a):null;
                          const cAmt=(item.unitPrice||0)*item.quantity;
                          const aAmt=an!==null?(item.unitPrice||0)*an:null;
                          const diff=aAmt!==null?aAmt-cAmt:null;
                          rows.push(
                            <tr key={item.id} style={{background:idx%2===0?"#fff":"#f9fafb"}}>
                              <td style={{border:"1px solid #e2e8f0",padding:"3px 5px",fontFamily:"monospace",fontSize:9,color:"#64748b",overflow:"hidden",textOverflow:"ellipsis"}}>{item.sku}</td>
                              <td style={{border:"1px solid #e2e8f0",padding:"3px 5px",fontWeight:600,overflow:"hidden",textOverflow:"ellipsis"}}>{item.name}</td>
                              <td style={{border:"1px solid #e2e8f0",padding:"3px 5px",fontSize:9,color:"#64748b",overflow:"hidden",textOverflow:"ellipsis"}}>{item.subCategory||"—"}</td>
                              <td style={{border:"1px solid #e2e8f0",padding:"3px 5px",textAlign:"right"}}>{item.unitPrice?item.unitPrice.toLocaleString():"—"}</td>
                              <td style={{border:"1px solid #e2e8f0",padding:"3px 5px",textAlign:"center"}}>{item.unit}</td>
                              <td style={{border:"1px solid #e2e8f0",padding:"3px 5px",textAlign:"right",fontWeight:700}}>{item.quantity.toLocaleString()}</td>
                              <td style={{border:"1px solid #e2e8f0",padding:"3px 5px",textAlign:"right",color:"#475569"}}>{cAmt>0?cAmt.toLocaleString():"—"}</td>
                              <td style={{border:"1px solid #e2e8f0",padding:"2px 3px",background:"#fffbeb",textAlign:"center"}}>
                                <input className="ai" type="number" min="0" value={a!==undefined?a:""} onChange={e=>setInvActual(p=>({...p,[item.id]:e.target.value}))} placeholder="" style={{width:"100%",border:"1px solid #fbbf24",borderRadius:3,padding:"2px 3px",fontSize:10,textAlign:"right",outline:"none",background:"#fffbeb",boxSizing:"border-box"}}/>
                              </td>
                              <td style={{border:"1px solid #e2e8f0",padding:"3px 5px",textAlign:"right",background:"#fffbeb",fontWeight:600,color:aAmt!==null?"#065f46":"#94a3b8"}}>{aAmt!==null?aAmt.toLocaleString():"—"}</td>
                              <td style={{border:"1px solid #e2e8f0",padding:"3px 5px",textAlign:"right",fontWeight:600,color:diff===null?"#94a3b8":diff>0?"#ef4444":diff<0?"#10b981":"#475569"}}>{diff!==null?(diff>=0?"+":"")+diff.toLocaleString():"—"}</td>
                              <td style={{border:"1px solid #e2e8f0",padding:"2px 3px"}}><input type="text" style={{width:"100%",border:"none",outline:"none",fontSize:9,background:"transparent"}}/></td>
                            </tr>
                          );
                        });
                        const gCur=grp.items.reduce((s,i)=>s+(i.unitPrice||0)*i.quantity,0);
                        const gAct=grp.items.reduce((s,i)=>{const a=invActual[i.id];if(a===undefined||a==="")return s;return s+(i.unitPrice||0)*Number(a);},0);
                        const gActQ=grp.items.reduce((s,i)=>{const a=invActual[i.id];return s+(a!==undefined&&a!==""?Number(a):0);},0);
                        rows.push(<tr key={"sg_"+gi} style={{background:"#f0fdf4"}}>
                          <td colSpan={5} style={{border:"1px solid #d1fae5",padding:"3px 8px",fontWeight:700,fontSize:10,color:"#065f46",textAlign:"right"}}>{grp.label||grp.cat} 小計</td>
                          <td style={{border:"1px solid #d1fae5",padding:"3px 5px",textAlign:"right",fontWeight:700,fontSize:10,color:"#065f46"}}>{grp.items.reduce((s,i)=>s+i.quantity,0).toLocaleString()}</td>
                          <td style={{border:"1px solid #d1fae5",padding:"3px 5px",textAlign:"right",fontWeight:700,fontSize:10,color:"#065f46"}}>{gCur>0?gCur.toLocaleString():"—"}</td>
                          <td style={{border:"1px solid #d1fae5",padding:"3px 5px",textAlign:"right",fontWeight:700,fontSize:10,color:"#065f46"}}>{gActQ>0?gActQ.toLocaleString():"—"}</td>
                          <td style={{border:"1px solid #d1fae5",padding:"3px 5px",textAlign:"right",fontWeight:700,fontSize:10,color:"#065f46"}}>{gAct>0?gAct.toLocaleString():"—"}</td>
                          <td style={{border:"1px solid #d1fae5",padding:"3px 5px",textAlign:"right",fontWeight:700,fontSize:10,color:gAct>0?(gAct-gCur>=0?"#ef4444":"#10b981"):"#94a3b8"}}>{gAct>0?((gAct-gCur>=0?"+":"")+(gAct-gCur).toLocaleString()):"—"}</td>
                          <td style={{border:"1px solid #d1fae5"}}></td>
                        </tr>);
                      });
                      if(prevCat){
                        const its=data.items.filter(i=>i.category===prevCat);
                        const cCur=its.reduce((s,i)=>s+(i.unitPrice||0)*i.quantity,0);
                        const cAct=its.reduce((s,i)=>{const a=invActual[i.id];if(a===undefined||a==="")return s;return s+(i.unitPrice||0)*Number(a);},0);
                        const cActQ=its.reduce((s,i)=>{const a=invActual[i.id];return s+(a!==undefined&&a!==""?Number(a):0);},0);
                        rows.push(<tr key={"ct_last"} style={{background:"#1e293b"}}>
                          <td colSpan={5} style={{border:"1px solid #334155",padding:"4px 8px",fontWeight:800,fontSize:10,color:"#f1f5f9",textAlign:"right"}}>{prevCat} 合計</td>
                          <td style={{border:"1px solid #334155",padding:"4px 5px",textAlign:"right",fontWeight:800,fontSize:10,color:"#fbbf24"}}>{its.reduce((s,i)=>s+i.quantity,0).toLocaleString()}</td>
                          <td style={{border:"1px solid #334155",padding:"4px 5px",textAlign:"right",fontWeight:800,fontSize:10,color:"#fbbf24"}}>{cCur>0?cCur.toLocaleString()+"円":"—"}</td>
                          <td style={{border:"1px solid #334155",padding:"4px 5px",textAlign:"right",fontWeight:800,fontSize:10,color:"#fbbf24"}}>{cActQ>0?cActQ.toLocaleString():"—"}</td>
                          <td style={{border:"1px solid #334155",padding:"4px 5px",textAlign:"right",fontWeight:800,fontSize:10,color:"#fbbf24"}}>{cAct>0?cAct.toLocaleString()+"円":"—"}</td>
                          <td style={{border:"1px solid #334155",padding:"4px 5px",textAlign:"right",fontWeight:800,fontSize:10,color:cAct>0?(cAct-cCur>=0?"#fbbf24":"#f87171"):"#94a3b8"}}>{cAct>0?((cAct-cCur>=0?"+":"")+(cAct-cCur).toLocaleString()+"円"):"—"}</td>
                          <td style={{border:"1px solid #334155"}}></td>
                        </tr>);
                      }
                      const gAll=data.items.reduce((s,i)=>s+(i.unitPrice||0)*i.quantity,0);
                      const gActAll=data.items.reduce((s,i)=>{const a=invActual[i.id];if(a===undefined||a==="")return s;return s+(i.unitPrice||0)*Number(a);},0);
                      const gActQAll=data.items.reduce((s,i)=>{const a=invActual[i.id];return s+(a!==undefined&&a!==""?Number(a):0);},0);
                      rows.push(<tr key="grand" style={{background:"#0f172a"}}>
                        <td colSpan={5} style={{border:"1px solid #1e293b",padding:"5px 10px",fontWeight:800,fontSize:11,color:"#f1f5f9",textAlign:"right"}}>総合計</td>
                        <td style={{border:"1px solid #1e293b",padding:"5px 6px",textAlign:"right",fontWeight:800,fontSize:11,color:"#fbbf24"}}>{data.items.reduce((s,i)=>s+i.quantity,0).toLocaleString()}</td>
                        <td style={{border:"1px solid #1e293b",padding:"5px 6px",textAlign:"right",fontWeight:800,fontSize:11,color:"#fbbf24"}}>{gAll>0?gAll.toLocaleString()+"円":"—"}</td>
                        <td style={{border:"1px solid #1e293b",padding:"5px 6px",textAlign:"right",fontWeight:800,fontSize:11,color:"#fbbf24"}}>{gActQAll>0?gActQAll.toLocaleString():"—"}</td>
                        <td style={{border:"1px solid #1e293b",padding:"5px 6px",textAlign:"right",fontWeight:800,fontSize:11,color:"#fbbf24"}}>{gActAll>0?gActAll.toLocaleString()+"円":"—"}</td>
                        <td style={{border:"1px solid #1e293b",padding:"5px 6px",textAlign:"right",fontWeight:800,fontSize:11,color:gActAll>0?(gActAll-gAll>=0?"#fbbf24":"#f87171"):"#94a3b8"}}>{gActAll>0?((gActAll-gAll>=0?"+":"")+(gActAll-gAll).toLocaleString()+"円"):"—"}</td>
                        <td style={{border:"1px solid #1e293b"}}></td>
                      </tr>);
                      return rows;
                    })()}
                  </tbody>
                </table>

                <div style={{marginTop:14,display:"flex",gap:10}}>
                  {["確認者","承認者","担当者"].map(role=>(
                    <div key={role} style={{flex:1,border:"1px solid #cbd5e1",borderRadius:4,padding:"6px 10px",minHeight:44}}>
                      <div style={{fontSize:10,fontWeight:700,color:"#64748b",marginBottom:6}}>{role}</div>
                    </div>
                  ))}
                </div>
              </div>
            </div>
          )}

          {/* 設定 */}
          {view==="settings"&&(
            <div>
              <h1 style={{fontSize:20,fontWeight:800,marginBottom:16,color:"#0f172a"}}>設定</h1>
              <div style={{background:"#fff",borderRadius:12,padding:20,boxShadow:"0 1px 4px rgba(0,0,0,0.06)",maxWidth:540}}>
                <h2 style={{fontSize:15,fontWeight:700,marginBottom:4}}>小カテゴリ管理</h2>
                <p style={{fontSize:12,color:"#64748b",marginBottom:14}}>✎ボタンで名前の編集、✕で削除できます。</p>
                {TOPS.map(cat=>(
                  <div key={cat} style={{marginBottom:16}}>
                    <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                      <span style={{fontWeight:700,fontSize:13}}>{cat}</span>
                      <button onClick={()=>{setForm(p=>({...p,_sp:cat,_sn:""}));setModal({type:"addSub"});}} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:6,padding:"3px 10px",fontSize:11,cursor:"pointer",fontWeight:700}}>＋ 追加</button>
                    </div>
                    {(subs[cat]||[]).length>0?(
                      <div style={{display:"flex",flexWrap:"wrap",gap:6,paddingLeft:8}}>
                        {(subs[cat]||[]).map(sub=>{
                          const isEd=editSub&&editSub.cat===cat&&editSub.old===sub;
                          return(
                            <div key={sub} style={{display:"flex",alignItems:"center",gap:4,background:"#f1f5f9",borderRadius:6,padding:"4px 8px"}}>
                              {isEd?(
                                <>
                                  <input autoFocus value={editSub.val} onChange={e=>setEditSub(s=>({...s,val:e.target.value}))}
                                    onKeyDown={e=>{if(e.key==="Enter")renameSubCat(cat,sub,editSub.val);if(e.key==="Escape")setEditSub(null);}}
                                    style={{fontSize:12,border:"1px solid #3b82f6",borderRadius:4,padding:"2px 6px",outline:"none",width:100}}/>
                                  <button onClick={()=>renameSubCat(cat,sub,editSub.val)} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:4,padding:"2px 7px",fontSize:11,cursor:"pointer",fontWeight:700}}>保存</button>
                                  <button onClick={()=>setEditSub(null)} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:12,padding:0}}>✕</button>
                                </>
                              ):(
                                <>
                                  <span style={{fontSize:12,color:"#334155"}}>{sub}</span>
                                  <button onClick={()=>setEditSub({cat,old:sub,val:sub})} style={{background:"none",border:"none",color:"#3b82f6",cursor:"pointer",fontSize:12,padding:"0 2px"}} title="名前を編集">✎</button>
                                  <button onClick={()=>delSubCat(cat,sub)} style={{background:"none",border:"none",color:"#94a3b8",cursor:"pointer",fontSize:13,padding:0}}>✕</button>
                                </>
                              )}
                            </div>
                          );
                        })}
                      </div>
                    ):(
                      <div style={{fontSize:12,color:"#cbd5e1",paddingLeft:8}}>小カテゴリなし</div>
                    )}
                  </div>
                ))}
                <hr style={{margin:"18px 0",border:"none",borderTop:"1px solid #f1f5f9"}}/>
                <h2 style={{fontSize:15,fontWeight:700,marginBottom:10}}>データ管理</h2>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  <button onClick={exportData} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"9px 14px",fontSize:13,fontWeight:700,cursor:"pointer",textAlign:"left"}}>
                    ⬇ エクスポート（データをコピー）<div style={{fontSize:11,fontWeight:400,opacity:0.85,marginTop:1}}>在庫データをテキストでコピーする</div>
                  </button>
                  <button onClick={()=>{setForm(p=>({...p,_it:""}));setModal({type:"import"});}} style={{background:"#f1f5f9",color:"#334155",border:"none",borderRadius:8,padding:"9px 14px",fontSize:13,fontWeight:700,cursor:"pointer",textAlign:"left"}}>
                    ⬆ インポート（テキスト貼り付け）<div style={{fontSize:11,fontWeight:400,color:"#64748b",marginTop:1}}>コピーしたデータを貼り付けて読み込む</div>
                  </button>
                  <button onClick={()=>{if(confirm("全データをリセットしますか？")){localStorage.removeItem(SK);setData(JSON.parse(JSON.stringify(SAMPLE)));setModal(null);}}} style={{background:"#fee2e2",color:"#ef4444",border:"none",borderRadius:8,padding:"9px 14px",fontSize:13,fontWeight:700,cursor:"pointer",textAlign:"left"}}>
                    ✕ データをリセット<div style={{fontSize:11,fontWeight:400,opacity:0.8,marginTop:1}}>全データを初期状態に戻す</div>
                  </button>
                </div>
              </div>
            </div>
          )}
        </main>
      </div>

      {/* MODALS */}
      {modal&&(
        <div onClick={()=>setModal(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:16}}>
          <div onClick={e=>e.stopPropagation()} style={{background:"#fff",borderRadius:16,padding:22,width:"100%",maxWidth:520,maxHeight:"92vh",overflow:"auto",boxShadow:"0 20px 60px rgba(0,0,0,0.2)"}}>

            {/* 品目登録・編集 */}
            {modal.type==="item"&&(
              <>
                <h2 style={{fontSize:17,fontWeight:800,marginBottom:8}}>{modal.id?"品目を編集":"品目を登録"}</h2>
                {!modal.id&&<div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"8px 12px",marginBottom:14,fontSize:12,color:"#065f46",display:"flex",alignItems:"center",gap:8}}>
                  <span style={{fontSize:15}}>📝</span><span>「次へ」で続けて登録できます</span>
                  {(form._count||0)>0&&<span style={{background:"#10b981",color:"#fff",borderRadius:12,padding:"1px 8px",fontSize:11,fontWeight:700,marginLeft:"auto"}}>{form._count}件登録済み</span>}
                </div>}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11}}>
                  <div style={{gridColumn:"1/-1"}}>
                    {lbl("品名")}
                    <input ref={nameRef} type="text" value={form.name||""} onChange={e=>setForm(p=>({...p,name:e.target.value}))}
                      onKeyDown={e=>{if(e.key==="Enter"&&!modal.id)saveItem(true);}}
                      style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,outline:"none"}} placeholder="品名を入力（Enterで次へ）"/>
                  </div>
                  <div style={{gridColumn:"1/-1"}}>
                    {lbl("商品コード")}
                    <div style={{display:"flex",gap:8,alignItems:"center"}}>
                      <input readOnly value={form.sku||""} style={{flex:1,border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,background:"#f8fafc",color:"#334155",fontWeight:700,letterSpacing:1,fontFamily:"monospace"}}/>
                      {modal.id&&<button onClick={regenSKU} style={{background:"#f59e0b",color:"#fff",border:"none",borderRadius:8,padding:"7px 12px",fontSize:12,fontWeight:700,cursor:"pointer",flexShrink:0}}>🔄 コード更新</button>}
                    </div>
                    {modal.id&&<div style={{fontSize:11,color:"#94a3b8",marginTop:3}}>※ カテゴリや小カテゴリを変更した場合は「コード更新」を押してください</div>}
                  </div>
                  <div>{lbl("大カテゴリ")}<select value={form.category||""} onChange={e=>onCatChange(e.target.value)} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,background:"#fff"}}>{TOPS.map(c=><option key={c}>{c}</option>)}</select></div>
                  <div>{lbl("小カテゴリ")}{(subs[form.category]||[]).length>0?<select value={form.subCategory||""} onChange={e=>onSubChange(e.target.value)} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,background:"#fff"}}><option value="">指定なし</option>{(subs[form.category]||[]).map(s=><option key={s}>{s}</option>)}</select>:<div style={{fontSize:12,color:"#94a3b8",padding:"8px 0"}}>小カテゴリなし</div>}</div>
                  <div>{lbl("現在数量")}{inp("quantity","number")}</div>
                  <div>{lbl("最低在庫数")}{inp("minQuantity","number")}</div>
                  <div>{lbl("単位")}{inp("unit")}</div>
                  <div>{lbl("単価（円）")}{inp("unitPrice","number")}</div>
                  <div style={{gridColumn:"1/-1"}}>{lbl("仕入先")}{inp("supplier","text","例：〇〇商事")}</div>
                  <div>{lbl("保管場所")}{inp("location")}</div>
                  <div style={{gridColumn:"1/-1"}}>{lbl("備考")}{inp("notes")}</div>
                </div>
                <div style={{marginTop:16}}>
                  <div style={{display:"flex",gap:8,justifyContent:"flex-end",flexWrap:"wrap"}}>
                    <button onClick={()=>setModal(null)} style={{border:"1px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"7px 15px",fontSize:13,cursor:"pointer"}}>{(form._count||0)>0?"完了":"キャンセル"}</button>
                    {!modal.id&&<button onClick={()=>saveItem(true)} style={{background:"#10b981",color:"#fff",border:"none",borderRadius:8,padding:"7px 15px",fontSize:13,fontWeight:700,cursor:"pointer"}}>次へ（続けて登録）▶</button>}
                    <button onClick={()=>saveItem(false)} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"7px 15px",fontSize:13,fontWeight:700,cursor:"pointer"}}>{modal.id?"保存して閉じる":"登録して閉じる"}</button>
                  </div>
                </div>
              </>
            )}

            {/* 品目削除（担当者認証）*/}
            {modal.type==="deleteItem"&&(
              <>
                <h2 style={{fontSize:17,fontWeight:800,marginBottom:4}}>品目を削除</h2>
                <p style={{fontSize:13,color:"#64748b",marginBottom:14}}>担当者コードを入力してください。</p>
                <div style={{background:"#f8fafc",borderRadius:8,padding:"10px 14px",marginBottom:14,fontSize:13}}><span style={{color:"#64748b"}}>削除対象：</span><strong>{form._diName}</strong></div>
                <div style={{marginBottom:16}}>
                  {lbl("担当者コード")}
                  <input value={form._diCode||""} onChange={e=>onDelItemCode(e.target.value)} placeholder="例：001" maxLength={10} style={{width:"100%",border:"2px solid #e2e8f0",borderRadius:8,padding:"8px 11px",fontSize:14,outline:"none",fontFamily:"monospace",letterSpacing:2}}/>
                  {(form._diCode||"")&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:form._diStaff?"#f0fdf4":"#fef2f2",border:"1px solid "+(form._diStaff?"#bbf7d0":"#fecaca")}}>
                    {form._diStaff?<span style={{color:"#065f46",fontWeight:700,fontSize:14}}>✓ 担当者：{form._diStaff.name}</span>:<span style={{color:"#dc2626",fontSize:13}}>✗ 担当者が見つかりません</span>}
                  </div>}
                </div>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button onClick={()=>setModal(null)} style={{border:"1px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"7px 15px",fontSize:13,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={confirmDeleteItem} style={{background:form._diStaff?"#ef4444":"#cbd5e1",color:"#fff",border:"none",borderRadius:8,padding:"7px 15px",fontSize:13,fontWeight:700,cursor:form._diStaff?"pointer":"not-allowed"}}>削除する</button>
                </div>
              </>
            )}

            {/* 入出庫 */}
            {modal.type==="tx"&&(
              <>
                <h2 style={{fontSize:17,fontWeight:800,marginBottom:4}}>入出庫を記録</h2>
                <div style={{color:"#64748b",fontSize:13,marginBottom:14}}>{form._txName}</div>
                <div style={{display:"flex",gap:8,marginBottom:12}}>
                  {[["in","▲ 入庫","#10b981"],["out","▼ 出庫","#ef4444"]].map(([v,l,col])=>(
                    <button key={v} onClick={()=>setForm(p=>({...p,type:v}))}
                      style={{flex:1,padding:"8px",borderRadius:8,border:form.type===v?"2px solid "+col:"2px solid #e2e8f0",background:form.type===v?col+"18":"#fff",color:form.type===v?col:"#64748b",fontWeight:700,fontSize:13,cursor:"pointer"}}>{l}</button>
                  ))}
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  <div>{lbl("数量")}{inp("quantity","number")}</div>
                  <div>{lbl("日付")}{inp("date","date")}</div>
                  {form.type==="in"&&<>
                    <div>{lbl("仕入先")}{inp("inSupplier","text","例：〇〇商事")}</div>
                    <div>
                      {lbl("仕入単価（円）")}
                      {inp("inUnitPrice","number","例：500")}
                      {form.inUnitPrice&&Number(form.inUnitPrice)>0&&(
                        <div style={{marginTop:5,padding:"6px 10px",background:"#f0fdf4",borderRadius:6,border:"1px solid #bbf7d0",fontSize:12}}>
                          <span style={{color:"#64748b"}}>現在単価：</span><strong>{(form._txCurPrice||0).toLocaleString()}円</strong>
                          <span style={{color:"#94a3b8",margin:"0 6px"}}>→</span>
                          <span style={{color:"#64748b"}}>加重平均後：</span>
                          <strong style={{color:"#065f46"}}>
                            {(form._txCurQty||0)+Number(form.quantity||0)>0
                              ?Math.round(((form._txCurPrice||0)*(form._txCurQty||0)+Number(form.inUnitPrice)*Number(form.quantity||0))/((form._txCurQty||0)+Number(form.quantity||0))).toLocaleString()
                              :Number(form.inUnitPrice).toLocaleString()}円
                          </strong>
                        </div>
                      )}
                    </div>
                  </>}
                  <div>{lbl("備考")}{inp("note")}</div>
                </div>
                <div style={{display:"flex",gap:8,marginTop:16,justifyContent:"flex-end"}}>
                  <button onClick={()=>setModal(null)} style={{border:"1px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"7px 15px",fontSize:13,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={saveTx} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"7px 15px",fontSize:13,fontWeight:700,cursor:"pointer"}}>記録する</button>
                </div>
              </>
            )}

            {/* 販売 */}
            {modal.type==="sale"&&(
              <>
                <h2 style={{fontSize:17,fontWeight:800,marginBottom:4}}>販売登録</h2>
                <div style={{color:"#64748b",fontSize:13,marginBottom:14}}>{form._saleName}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,marginBottom:14}}>
                  <div style={{gridColumn:"1/-1"}}>{lbl("顧客名")}{inp("customer")}</div>
                  <div>{lbl("販売台数")}{inp("saleQty","number")}</div>
                  <div>{lbl("販売日")}{inp("saleDate","date")}</div>
                  <div style={{gridColumn:"1/-1"}}>{lbl("商品コード")}<input value={form.serialNo||""} onChange={e=>setForm(p=>({...p,serialNo:e.target.value}))} style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,outline:"none",fontFamily:"monospace",fontWeight:700,letterSpacing:1}}/></div>
                  <div style={{gridColumn:"1/-1"}}>{lbl("都道府県・市町村")}{inp("prefecture","text","例：大阪府大阪市")}</div>
                  <div>{lbl("販売店名")}{inp("shopName")}</div>
                  <div>{lbl("取引先担当者")}{inp("contactPerson")}</div>
                  <div style={{gridColumn:"1/-1"}}>{lbl("備考")}{inp("saleNote")}</div>
                </div>
                {getBom(form._salePid)?(
                  <div style={{marginBottom:14}}>
                    <div style={{fontSize:12,fontWeight:700,color:"#475569",marginBottom:6}}>部品在庫チェック（{form.saleQty||1}台分）</div>
                    {shortages.length>0?(
                      <div style={{background:"#fef2f2",border:"1px solid #fecaca",borderRadius:8,padding:10}}>
                        <div style={{fontSize:12,color:"#dc2626",fontWeight:700,marginBottom:5}}>⚠ 以下の部品が不足（強制実行可能）</div>
                        {shortages.map(s=><div key={s.name} style={{fontSize:12,color:"#7f1d1d",marginBottom:2}}>・{s.name}：必要{s.need}{s.unit} / 在庫{s.have}{s.unit}（不足{s.shortage}{s.unit}）</div>)}
                      </div>
                    ):(
                      <div style={{background:"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:8,padding:"7px 12px",fontSize:12,color:"#065f46",fontWeight:600}}>✓ 全部品の在庫が十分あります</div>
                    )}
                  </div>
                ):(
                  <div style={{background:"#fffbeb",border:"1px solid #fde68a",borderRadius:8,padding:"7px 12px",fontSize:12,color:"#92400e",marginBottom:14}}>⚠ BOM未登録のため部品在庫は自動で引かれません</div>
                )}
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button onClick={()=>setModal(null)} style={{border:"1px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"7px 15px",fontSize:13,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={execSale} style={{background:shortages.length>0?"#ef4444":"#10b981",color:"#fff",border:"none",borderRadius:8,padding:"7px 15px",fontSize:13,fontWeight:700,cursor:"pointer"}}>{shortages.length>0?"⚠ 強制実行":"✓ 販売確定"}</button>
                </div>
              </>
            )}

            {/* 販売削除（担当者認証）*/}
            {modal.type==="deleteSale"&&(
              <>
                <h2 style={{fontSize:17,fontWeight:800,marginBottom:4}}>販売記録を削除</h2>
                <p style={{fontSize:13,color:"#64748b",marginBottom:14}}>削除するとゴミ箱に移動されます。担当者コードを入力してください。</p>
                <div style={{background:"#f8fafc",borderRadius:8,padding:"12px 14px",marginBottom:14,fontSize:13}}>
                  <div><span style={{color:"#64748b"}}>顧客名：</span><strong>{form._dsTarget&&form._dsTarget.customer}</strong></div>
                  <div><span style={{color:"#64748b"}}>製品：</span>{form._dsTarget&&iName(form._dsTarget.productId)}</div>
                  <div><span style={{color:"#64748b"}}>日付：</span>{form._dsTarget&&form._dsTarget.date}</div>
                  <div><span style={{color:"#64748b"}}>商品コード：</span>{form._dsTarget&&(form._dsTarget.serialNo||"—")}</div>
                </div>
                <div style={{marginBottom:16}}>
                  {lbl("担当者コード")}
                  <input value={form._dsCode||""} onChange={e=>onDelSaleCode(e.target.value)} placeholder="例：001" maxLength={10} style={{width:"100%",border:"2px solid #e2e8f0",borderRadius:8,padding:"8px 11px",fontSize:14,outline:"none",fontFamily:"monospace",letterSpacing:2}}/>
                  {(form._dsCode||"")&&<div style={{marginTop:8,padding:"8px 12px",borderRadius:8,background:form._dsStaff?"#f0fdf4":"#fef2f2",border:"1px solid "+(form._dsStaff?"#bbf7d0":"#fecaca")}}>
                    {form._dsStaff?<span style={{color:"#065f46",fontWeight:700,fontSize:14}}>✓ 担当者：{form._dsStaff.name}</span>:<span style={{color:"#dc2626",fontSize:13}}>✗ 担当者が見つかりません</span>}
                  </div>}
                </div>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button onClick={()=>setModal(null)} style={{border:"1px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"7px 15px",fontSize:13,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={confirmDeleteSale} style={{background:form._dsStaff?"#ef4444":"#cbd5e1",color:"#fff",border:"none",borderRadius:8,padding:"7px 15px",fontSize:13,fontWeight:700,cursor:form._dsStaff?"pointer":"not-allowed"}}>ゴミ箱へ移動</button>
                </div>
              </>
            )}

            {/* BOM編集 */}
            {modal.type==="bom"&&(
              <>
                <h2 style={{fontSize:17,fontWeight:800,marginBottom:4}}>部品構成を編集</h2>
                <div style={{color:"#64748b",fontSize:13,marginBottom:12}}>{iName(form._bomPid)}</div>
                <div style={{background:"#f8fafc",borderRadius:10,padding:"10px 12px",marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#475569",marginBottom:8}}>🔍 部品を検索・絞り込み</div>
                  <div style={{display:"flex",flexDirection:"column",gap:7}}>
                    <input value={bomSearch} onChange={e=>setBomSearch(e.target.value)} placeholder="品名・コードで検索…" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:7,padding:"6px 10px",fontSize:13,outline:"none"}}/>
                    <div style={{display:"flex",gap:7}}>
                      <select value={bomCat} onChange={e=>{setBomCat(e.target.value);setBomSub("全て");}} style={{flex:1,border:"1px solid #e2e8f0",borderRadius:7,padding:"6px 8px",fontSize:12,background:"#fff",cursor:"pointer"}}>
                        <option value="全て">全カテゴリ</option>
                        {TOPS.filter(c=>data.items.some(i=>i.id!==form._bomPid&&i.category===c)).map(c=><option key={c}>{c}</option>)}
                      </select>
                      <select value={bomSub} onChange={e=>setBomSub(e.target.value)} style={{flex:1,border:"1px solid #e2e8f0",borderRadius:7,padding:"6px 8px",fontSize:12,background:"#fff",cursor:"pointer"}}>
                        <option value="全て">全小カテゴリ</option>
                        {bomCat!=="全て"&&(subs[bomCat]||[]).filter(s=>data.items.some(i=>i.id!==form._bomPid&&i.category===bomCat&&i.subCategory===s)).map(s=><option key={s}>{s}</option>)}
                      </select>
                    </div>
                  </div>
                </div>
                {(()=>{
                  const cands=data.items.filter(i=>{
                    if(i.id===form._bomPid)return false;
                    if(bomCat!=="全て"&&i.category!==bomCat)return false;
                    if(bomSub!=="全て"&&(i.subCategory||"")!==bomSub)return false;
                    if(bomSearch&&!i.name.includes(bomSearch)&&!i.sku.includes(bomSearch))return false;
                    return true;
                  });
                  return(
                    <div style={{marginBottom:12}}>
                      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:6}}>
                        <span style={{fontSize:12,fontWeight:700,color:"#475569"}}>検索結果 {cands.length}件</span>
                        <span style={{fontSize:11,color:"#94a3b8"}}>登録済み {(form.parts||[]).filter(p=>p.partId).length}点</span>
                      </div>
                      <div style={{maxHeight:240,overflowY:"auto",border:"1px solid #e2e8f0",borderRadius:8}}>
                        {cands.length===0?<div style={{padding:16,textAlign:"center",color:"#94a3b8",fontSize:13}}>該当する部品がありません</div>:(
                          <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                            <thead style={{position:"sticky",top:0,background:"#f1f5f9",zIndex:1}}>
                              <tr>
                                <th style={{padding:"5px 8px",textAlign:"left",fontWeight:700,color:"#64748b",fontSize:11,borderBottom:"1px solid #e2e8f0",width:32}}>選択</th>
                                <th style={{padding:"5px 8px",textAlign:"left",fontWeight:700,color:"#64748b",fontSize:11,borderBottom:"1px solid #e2e8f0"}}>品名</th>
                                <th style={{padding:"5px 8px",textAlign:"left",fontWeight:700,color:"#64748b",fontSize:11,borderBottom:"1px solid #e2e8f0"}}>小カテゴリ</th>
                                <th style={{padding:"5px 8px",textAlign:"right",fontWeight:700,color:"#64748b",fontSize:11,borderBottom:"1px solid #e2e8f0",width:56}}>在庫</th>
                                <th style={{padding:"5px 8px",textAlign:"right",fontWeight:700,color:"#64748b",fontSize:11,borderBottom:"1px solid #e2e8f0",width:64}}>必要数</th>
                              </tr>
                            </thead>
                            <tbody>
                              {cands.map((item,idx)=>{
                                const ei=(form.parts||[]).findIndex(p=>p.partId===item.id);
                                const isR=ei>=0;
                                const cq=isR?(form.parts[ei].qty||1):1;
                                return(
                                  <tr key={item.id} style={{borderBottom:"1px solid #f8fafc",background:isR?"#f0fdf4":idx%2===0?"#fff":"#fafafa"}}>
                                    <td style={{padding:"5px 8px",textAlign:"center"}}>
                                      <input type="checkbox" checked={isR} onChange={e=>{
                                        if(e.target.checked)setForm(f=>({...f,parts:[...(f.parts||[]),{partId:item.id,qty:1}]}));
                                        else setForm(f=>({...f,parts:(f.parts||[]).filter(p=>p.partId!==item.id)}));
                                      }} style={{cursor:"pointer",width:15,height:15}}/>
                                    </td>
                                    <td style={{padding:"5px 8px"}}>
                                      <div style={{fontWeight:isR?700:400,color:isR?"#065f46":"#1e293b"}}>{item.name}</div>
                                      <div style={{fontSize:10,color:"#94a3b8",fontFamily:"monospace"}}>{item.sku}</div>
                                    </td>
                                    <td style={{padding:"5px 8px",fontSize:11,color:"#64748b"}}>{item.subCategory||"—"}</td>
                                    <td style={{padding:"5px 8px",textAlign:"right",fontWeight:600}}>{item.quantity}{item.unit}</td>
                                    <td style={{padding:"5px 8px",textAlign:"right"}}>
                                      {isR?<input type="number" min="1" value={cq} onChange={e=>setForm(f=>({...f,parts:f.parts.map((p,i)=>i===ei?{...p,qty:Number(e.target.value)||1}:p)}))} style={{width:52,border:"1px solid #10b981",borderRadius:5,padding:"2px 5px",fontSize:12,textAlign:"right",outline:"none",background:"#f0fdf4"}}/>:<span style={{color:"#cbd5e1",fontSize:11}}>—</span>}
                                    </td>
                                  </tr>
                                );
                              })}
                            </tbody>
                          </table>
                        )}
                      </div>
                    </div>
                  );
                })()}
                {(form.parts||[]).filter(p=>p.partId).length>0&&(
                  <div style={{background:"#eff6ff",border:"1px solid #bfdbfe",borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:12}}>
                    <div style={{fontWeight:700,color:"#1d4ed8",marginBottom:4}}>登録済み部品 {(form.parts||[]).filter(p=>p.partId).length}点</div>
                    <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                      {(form.parts||[]).filter(p=>p.partId).map((p,i)=>{
                        const it=data.items.find(x=>x.id===p.partId);
                        return<span key={i} style={{background:"#dbeafe",color:"#1e40af",borderRadius:5,padding:"2px 8px",fontSize:11,display:"flex",alignItems:"center",gap:4}}>
                          {it?it.name:"不明"} × {p.qty}
                          <button onClick={()=>setForm(f=>({...f,parts:f.parts.filter((_,j)=>j!==i)}))} style={{background:"none",border:"none",color:"#3b82f6",cursor:"pointer",fontSize:12,padding:0,lineHeight:1}}>✕</button>
                        </span>;
                      })}
                    </div>
                  </div>
                )}
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button onClick={()=>setModal(null)} style={{border:"1px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"7px 15px",fontSize:13,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={saveBom} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"7px 15px",fontSize:13,fontWeight:700,cursor:"pointer"}}>保存</button>
                </div>
              </>
            )}

            {/* 小カテゴリ追加 */}
            {modal.type==="addSub"&&(
              <>
                <h2 style={{fontSize:17,fontWeight:800,marginBottom:4}}>小カテゴリを追加</h2>
                <div style={{color:"#64748b",fontSize:13,marginBottom:14}}>大カテゴリ：{form._sp}</div>
                {lbl("小カテゴリ名")}{inp("_sn")}
                <div style={{display:"flex",gap:8,marginTop:14,justifyContent:"flex-end"}}>
                  <button onClick={()=>setModal(null)} style={{border:"1px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"7px 15px",fontSize:13,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={addSubCat} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"7px 15px",fontSize:13,fontWeight:700,cursor:"pointer"}}>追加</button>
                </div>
              </>
            )}

            {/* 受注・製造登録 */}
            {modal.type==="order"&&(
              <>
                <h2 style={{fontSize:17,fontWeight:800,marginBottom:14}}>{modal.id?"受注を編集":"新規受注を登録"}</h2>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:11,marginBottom:14}}>
                  <div style={{gridColumn:"1/-1"}}>
                    {lbl("取引先（必須）")}
                    <input value={form._ordClient||""} onChange={e=>setForm(p=>({...p,_ordClient:e.target.value}))} placeholder="例：株式会社〇〇"
                      style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,outline:"none"}}/>
                  </div>
                  <div style={{gridColumn:"1/-1"}}>
                    {lbl("納品先住所")}
                    <input value={form._ordAddr||""} onChange={e=>setForm(p=>({...p,_ordAddr:e.target.value}))} placeholder="例：大阪府大阪市〇〇"
                      style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,outline:"none"}}/>
                  </div>
                  <div>
                    {lbl("受注日")}
                    <input type="date" value={form._ordDate||todayStr()} onChange={e=>setForm(p=>({...p,_ordDate:e.target.value}))}
                      style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,outline:"none"}}/>
                  </div>
                  <div>
                    {lbl("納期")}
                    <input type="date" value={form._ordDeadline||""} onChange={e=>setForm(p=>({...p,_ordDeadline:e.target.value}))}
                      style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,outline:"none"}}/>
                  </div>
                  <div style={{gridColumn:"1/-1"}}>
                    {lbl("備考")}
                    <input value={form._ordNote||""} onChange={e=>setForm(p=>({...p,_ordNote:e.target.value}))} placeholder="備考・メモ"
                      style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:8,padding:"7px 11px",fontSize:13,outline:"none"}}/>
                  </div>
                </div>
                <div style={{marginBottom:12}}>
                  <div style={{fontSize:12,fontWeight:700,color:"#475569",marginBottom:8}}>製品明細（複数入力可）</div>
                  <div style={{display:"flex",flexDirection:"column",gap:7,maxHeight:260,overflowY:"auto"}}>
                    {(form._ordProds||[{model:"",serialNo:"",done:false}]).map((p,pi)=>(
                      <div key={pi} style={{display:"flex",gap:7,alignItems:"flex-end",padding:"8px 10px",background:p.done?"#f0fdf4":"#f8fafc",borderRadius:8,border:"1px solid "+(p.done?"#bbf7d0":"#e2e8f0")}}>
                        <div style={{flex:2}}>
                          <div style={{fontSize:10,color:"#64748b",marginBottom:2}}>製品型式</div>
                          <input value={p.model||""} onChange={e=>setForm(f=>({...f,_ordProds:f._ordProds.map((pp,i)=>i===pi?{...pp,model:e.target.value}:pp)}))}
                            placeholder="例：MODEL-A" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:6,padding:"5px 8px",fontSize:12,outline:"none"}}/>
                        </div>
                        <div style={{flex:2}}>
                          <div style={{fontSize:10,color:"#64748b",marginBottom:2}}>製造番号</div>
                          <input value={p.serialNo||""} onChange={e=>setForm(f=>({...f,_ordProds:f._ordProds.map((pp,i)=>i===pi?{...pp,serialNo:e.target.value}:pp)}))}
                            placeholder="例：SN-001" style={{width:"100%",border:"1px solid #e2e8f0",borderRadius:6,padding:"5px 8px",fontSize:12,outline:"none",fontFamily:"monospace"}}/>
                        </div>
                        <div style={{flexShrink:0,textAlign:"center"}}>
                          <div style={{fontSize:10,color:"#64748b",marginBottom:2}}>製造完了</div>
                          <button onClick={()=>setForm(f=>({...f,_ordProds:f._ordProds.map((pp,i)=>i===pi?{...pp,done:!pp.done}:pp)}))}
                            style={{width:38,height:30,borderRadius:6,border:"2px solid "+(p.done?"#10b981":"#cbd5e1"),background:p.done?"#10b981":"#fff",color:"#fff",cursor:"pointer",fontWeight:800,fontSize:14,display:"flex",alignItems:"center",justifyContent:"center"}}>
                            {p.done?"✓":""}
                          </button>
                        </div>
                        <button onClick={()=>setForm(f=>({...f,_ordProds:f._ordProds.filter((_,i)=>i!==pi)}))}
                          style={{background:"#fee2e2",color:"#ef4444",border:"none",borderRadius:6,padding:"6px 9px",cursor:"pointer",fontWeight:700,fontSize:13,flexShrink:0}}>✕</button>
                      </div>
                    ))}
                  </div>
                  <button onClick={()=>setForm(f=>({...f,_ordProds:[...(f._ordProds||[]),{model:"",serialNo:"",done:false}]}))}
                    style={{background:"#f1f5f9",color:"#334155",border:"none",borderRadius:8,padding:"7px 14px",fontSize:13,fontWeight:700,cursor:"pointer",marginTop:8,width:"100%"}}>＋ 製品を追加</button>
                </div>
                <div style={{display:"flex",gap:8,justifyContent:"flex-end"}}>
                  <button onClick={()=>setModal(null)} style={{border:"1px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"7px 15px",fontSize:13,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={saveOrder} style={{background:"#8b5cf6",color:"#fff",border:"none",borderRadius:8,padding:"7px 15px",fontSize:13,fontWeight:700,cursor:"pointer"}}>保存</button>
                </div>
              </>
            )}

            {/* エクスポート */}
            {modal.type==="export"&&(
              <>
                <h2 style={{fontSize:17,fontWeight:800,marginBottom:4}}>データをエクスポート</h2>
                <p style={{fontSize:13,color:"#64748b",marginBottom:12}}>「クリップボードにコピー」を押してから、メモ帳などに貼り付けて保存してください。</p>
                <button onClick={copyData} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"8px 16px",fontSize:13,fontWeight:700,cursor:"pointer",marginBottom:10,width:"100%"}}>📋 クリップボードにコピー</button>
                <textarea readOnly value={JSON.stringify(data,null,2)} onClick={e=>e.target.select()} style={{width:"100%",height:200,border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px",fontSize:11,fontFamily:"monospace",resize:"vertical",color:"#334155"}}/>
                <div style={{display:"flex",justifyContent:"flex-end",marginTop:10}}>
                  <button onClick={()=>setModal(null)} style={{border:"1px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"7px 15px",fontSize:13,cursor:"pointer"}}>閉じる</button>
                </div>
              </>
            )}

            {/* インポート */}
            {modal.type==="import"&&(
              <>
                <h2 style={{fontSize:17,fontWeight:800,marginBottom:4}}>データをインポート</h2>
                <p style={{fontSize:13,color:"#64748b",marginBottom:10}}>エクスポートしたテキストをここに貼り付けてください。</p>
                <textarea value={form._it||""} onChange={e=>setForm(p=>({...p,_it:e.target.value}))} placeholder="ここにテキストを貼り付け…" style={{width:"100%",height:220,border:"1px solid #e2e8f0",borderRadius:8,padding:"8px 10px",fontSize:12,fontFamily:"monospace",resize:"vertical",outline:"none"}}/>
                <div style={{display:"flex",gap:8,marginTop:12,justifyContent:"flex-end"}}>
                  <button onClick={()=>setModal(null)} style={{border:"1px solid #e2e8f0",background:"#fff",borderRadius:8,padding:"7px 15px",fontSize:13,cursor:"pointer"}}>キャンセル</button>
                  <button onClick={importText} style={{background:"#3b82f6",color:"#fff",border:"none",borderRadius:8,padding:"7px 15px",fontSize:13,fontWeight:700,cursor:"pointer"}}>インポート</button>
                </div>
              </>
            )}

          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<script>
if('serviceWorker' in navigator){
  navigator.serviceWorker.getRegistrations().then(regs=>{regs.forEach(r=>r.unregister());});
  caches.keys().then(names=>{names.forEach(n=>caches.delete(n));});
}
</script>
</body>
</html>
